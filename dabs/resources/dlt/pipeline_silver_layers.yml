resources:
  pipelines:
    pipeline_silver_apps_logs:
      name: "[${bundle.target}] dm-silver-apps-logs"
      description: >
        DLT pipeline que consome b_fast.kafka_topics_multiplexed (logs)
        e grava na camada Silver (s_logs.apps_logs_fast).
        Equivalente ao spark-streaming-jobs/3_job_silver_apps_logs.py no AS-IS.

      catalog: ${var.catalog}
      target: s_logs

      libraries:
        - notebook:
            path: ../../src/streaming/3_pipeline_silver_apps_logs.py

      serverless: true

      development: ${var.dlt_development}
      continuous: true
      channel: CURRENT

    pipeline_silver_blocks_events:
      name: "[${bundle.target}] dm-silver-blocks-events"
      description: >
        DLT pipeline para Silver de eventos de blocos minerados.
        Equivalente ao spark-streaming-jobs/4_job_silver_blocks_events.py no AS-IS.

      catalog: ${var.catalog}
      target: s_apps

      libraries:
        - notebook:
            path: ../../src/streaming/4_pipeline_silver_blocks_events.py

      serverless: true

      development: ${var.dlt_development}
      continuous: true
      channel: CURRENT

    pipeline_silver_blocks:
      name: "[${bundle.target}] dm-silver-blocks"
      description: >
        DLT pipeline para Silver de dados completos dos blocos Ethereum.
        Equivalente ao spark-streaming-jobs/5_job_silver_blocks.py no AS-IS.

      catalog: ${var.catalog}
      target: s_apps

      libraries:
        - notebook:
            path: ../../src/streaming/5_pipeline_silver_blocks.py

      serverless: true

      development: ${var.dlt_development}
      continuous: true
      channel: CURRENT

    pipeline_silver_transactions:
      name: "[${bundle.target}] dm-silver-transactions"
      description: >
        DLT pipeline para Silver de transações Ethereum completas.
        Equivalente ao spark-streaming-jobs/6_job_silver_transactions.py no AS-IS.

      catalog: ${var.catalog}
      target: s_apps

      libraries:
        - notebook:
            path: ../../src/streaming/6_pipeline_silver_transactions.py

      serverless: true

      development: ${var.dlt_development}
      continuous: true
      channel: CURRENT
