resources:
  pipelines:
    pipeline_ethereum:
      name: "dm-ethereum"

      catalog: ${var.catalog}
      target: b_ethereum   # schema padrão para tabelas sem prefixo (bronze)
                           # tabelas silver usam name="s_apps.*" / "s_logs.*"

      libraries:
        - notebook:
            path: ../../src/streaming/4_pipeline_ethereum.py

      configuration:
        # S3 bucket for ingestion (raw data, DLT external tables, checkpoints)
        ingestion.s3.bucket: ${var.ingestion_s3_bucket}
        # Catalog name (para spark.table() referências a tabelas externas ao DLT)
        catalog: ${var.catalog}
        # S3 export path (para MVs que exportam dados para consumo externo)
        s3.export.path: "s3://${var.ingestion_s3_bucket}/exports/popular_contracts"

      serverless: true

      development: ${var.dlt_development}
      continuous: ${var.dlt_continuous}
      channel: CURRENT

      trigger:
        # Executa a cada 30 min em PROD (despausar após validação)
        # Em DEV, acionar manualmente via: make dabs_run_dev JOB=dm-ethereum
        cron:
          quartz_cron_expression: "0 0/30 * * * ?"
          timezone_id: "America/Sao_Paulo"
          pause_status: PAUSED
