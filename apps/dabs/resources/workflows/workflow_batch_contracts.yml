resources:
  jobs:
    workflow_batch_contracts:
      name: "dm-batch-contracts"

      # Pipeline batch para contratos: S3 batch/ → Bronze → Silver
      # Triggered manualmente ou via deploy_dm_applications.yml
      # Substituiu: workflow_batch_s3_to_bronze.yml + workflow_batch_bronze_to_silver.yml

      max_concurrent_runs: 1

      tasks:
        - task_key: s3_to_bronze_contracts_txs
          notebook_task:
            notebook_path: ../../src/batch/batch_contracts/1_s3_to_bronze_contracts_txs.py
            source: WORKSPACE
            base_parameters:
              catalog:    ${var.catalog}
              s3_bucket:  ${var.dev_ingestion_s3_bucket}
              s3_prefix:  batch
              exec_date:  "1970-01-01T00"

        - task_key: bronze_to_silver_contracts_txs
          depends_on:
            - task_key: s3_to_bronze_contracts_txs
          notebook_task:
            notebook_path: ../../src/batch/batch_contracts/2_bronze_to_silver_contracts_txs.py
            source: WORKSPACE
            base_parameters:
              catalog:   ${var.catalog}
              exec_date: "1970-01-01T00"

      tags:
        layer:   silver
        project: dd-chain-explorer
