name: Deploy DM Applications

on:
  workflow_dispatch:
    inputs:
      app_type:
        description: 'Application type to deploy'
        required: true
        type: choice
        options:
          - streaming-apps
          - databricks-dabs
          - lambda-functions

permissions:
  contents: write

env:
  AWS_REGION:              sa-east-1
  TF_VERSION:              1.7.0
  ECS_CLUSTER:             dm-chain-explorer-ecs
  HML_ECS_CLUSTER:         dm-hml-ecs
  ECR_REPO:                onchain-stream-txs
  DATABRICKS_CLI_VERSION:  0.218.0
  DABS_PATH:               apps/dabs
  LAMBDA_DIR:              apps/lambda
  UTILS_DIR:               utils
  PRD_TF_LAMBDA:           services/prd/06_lambda
  TF_STATE_BUCKET:         dm-chain-explorer-terraform-state
  PRD_LAMBDA_ROLE:         dm-dd-chain-explorer-prd-contracts-ingestion-lambda

jobs:

  # ── Branch guard ───────────────────────────────────────────────
  branch-guard:
    name: Branch guard
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop branch
        run: bash "$GITHUB_WORKSPACE/scripts/ci/branch_guard.sh"

  # ══════════════════════════════════════════════════════════════
  #  STREAMING APPS
  # ══════════════════════════════════════════════════════════════

  stream-check-infra:
    name: Stream — Check PRD infra prerequisites
    needs: branch-guard
    if: github.event.inputs.app_type == 'streaming-apps'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Verify PRD infra prerequisites
        run: bash "$GITHUB_WORKSPACE/scripts/ci/check_infra_prerequisites.sh"
        env:
          APP_TYPE: streaming-apps

  stream-check-version:
    name: Stream — Check version
    needs: [branch-guard, stream-check-infra]
    if: github.event.inputs.app_type == 'streaming-apps'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read and validate VERSION
        id: ver
        run: bash "$GITHUB_WORKSPACE/scripts/ci/check_app_version.sh"
        env:
          TAG_SUFFIX: ""

  stream-lint-and-test:
    name: Stream — Lint & unit tests
    needs: stream-check-version
    if: github.event.inputs.app_type == 'streaming-apps'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: utils/pyproject.toml
      - run: pip install --upgrade pip && pip install "utils/[dev]"
      - run: pytest utils/tests/unit/ -v --tb=short
      - name: Validate Docker Compose
        run: docker compose -f services/dev/compose/app_services.yml config --quiet

  stream-check-idempotency:
    name: Stream — Check if deploy is needed
    needs: [stream-lint-and-test, stream-check-version]
    if: github.event.inputs.app_type == 'streaming-apps'
    runs-on: ubuntu-latest
    outputs:
      skip:      ${{ steps.check.outputs.skip }}
      image_tag: ${{ steps.check.outputs.image_tag }}
      version:   ${{ needs.stream-check-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Compare HEAD SHA with latest deployed ECR tag
        id: check
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          DEPLOYED_SHA=$(aws ecr describe-images \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageTags' \
            --output json 2>/dev/null \
            | jq -r '.[] | select(startswith("rc-") | not) | select(. != "latest")' | head -1) || DEPLOYED_SHA=""
          if [ "$IMAGE_TAG" = "$DEPLOYED_SHA" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::Image for SHA $IMAGE_TAG already deployed — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  stream-build-rc:
    name: Stream — Build & push RC image
    needs: stream-check-idempotency
    if: github.event.inputs.app_type == 'streaming-apps' && needs.stream-check-idempotency.outputs.skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      rc_tag:       ${{ steps.meta.outputs.rc_tag }}
      ecr_registry: ${{ steps.meta.outputs.ecr_registry }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Resolve RC tag & ECR registry
        id: meta
        run: |
          RC_TAG="rc-${{ needs.stream-check-idempotency.outputs.image_tag }}"
          ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          echo "rc_tag=$RC_TAG"             >> $GITHUB_OUTPUT
          echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin "${{ steps.meta.outputs.ecr_registry }}"
      - name: Build and push RC image
        uses: docker/build-push-action@v5
        with:
          context: .
          file:    apps/docker/onchain-stream-txs/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.ecr_registry }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.rc_tag }}

  stream-hml-provision:
    name: Stream — Provision HML environment
    needs: [stream-check-idempotency, stream-build-rc]
    if: github.event.inputs.app_type == 'streaming-apps' && needs.stream-check-idempotency.outputs.skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      hml_sg_id:            ${{ steps.provision.outputs.hml_sg_id }}
      sqs_url_mined_blocks: ${{ steps.provision.outputs.sqs_url_mined_blocks }}
      sqs_url_txs_hash_ids: ${{ steps.provision.outputs.sqs_url_txs_hash_ids }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Provision HML environment
        id: provision
        run: bash "$GITHUB_WORKSPACE/scripts/ci/hml_provision.sh"
        env:
          HML_VPC_ID: ${{ secrets.HML_VPC_ID }}

  stream-hml-integration-test:
    name: Stream — HML integration test
    needs: [stream-check-idempotency, stream-build-rc, stream-hml-provision]
    if: github.event.inputs.app_type == 'streaming-apps' && needs.stream-check-idempotency.outputs.skip != 'true'
    runs-on: ubuntu-latest
    outputs:
      test_passed: ${{ steps.monitor.outputs.test_passed }}
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Create HML DynamoDB table
        run: |
          aws dynamodb create-table \
            --table-name "dm-chain-explorer-hml" \
            --attribute-definitions AttributeName=PK,AttributeType=S AttributeName=SK,AttributeType=S \
            --key-schema AttributeName=PK,KeyType=HASH AttributeName=SK,KeyType=RANGE \
            --billing-mode PAY_PER_REQUEST \
            --region "${{ env.AWS_REGION }}" 2>/dev/null || echo "DynamoDB table already exists"
      - name: Launch HML streaming tasks (RC image)
        run: |
          EXEC_ROLE="${{ secrets.ECS_TASK_EXECUTION_ROLE_ARN }}"
          TASK_ROLE="${{ secrets.ECS_TASK_ROLE_ARN }}"
          SUBNET="${{ secrets.HML_SUBNET_ID }}"
          HML_SG="${{ needs.stream-hml-provision.outputs.hml_sg_id }}"
          RC_IMAGE="${{ needs.stream-build-rc.outputs.ecr_registry }}/${{ env.ECR_REPO }}:${{ needs.stream-build-rc.outputs.rc_tag }}"
          REGION="${{ env.AWS_REGION }}"
          SQS_MINED="${{ needs.stream-hml-provision.outputs.sqs_url_mined_blocks }}"
          SQS_TXS="${{ needs.stream-hml-provision.outputs.sqs_url_txs_hash_ids }}"
          for SVC in dm-mined-blocks-watcher dm-orphan-blocks-watcher dm-block-data-crawler dm-mined-txs-crawler dm-txs-input-decoder; do
            aws ecs register-task-definition --cli-input-json "$(jq -n \
              --arg svc "$SVC" --arg img "$RC_IMAGE" --arg exec "$EXEC_ROLE" --arg task "$TASK_ROLE" \
              --arg region "$REGION" --arg sqs_mined "$SQS_MINED" --arg sqs_txs "$SQS_TXS" \
              '{"family":("hml-"+$svc),"networkMode":"awsvpc","requiresCompatibilities":["FARGATE"],"cpu":"256","memory":"512","executionRoleArn":$exec,"taskRoleArn":$task,"containerDefinitions":[{"name":$svc,"image":$img,"essential":true,"environment":[{"name":"DYNAMODB_TABLE","value":"dm-chain-explorer-hml"},{"name":"CLOUDWATCH_LOG_GROUP","value":"/apps/dm-chain-explorer-hml"},{"name":"ENV","value":"hml"},{"name":"JOB_NAME","value":$svc},{"name":"SQS_QUEUE_URL_MINED_BLOCKS","value":$sqs_mined},{"name":"SQS_QUEUE_URL_TXS_HASH_IDS","value":$sqs_txs},{"name":"KINESIS_STREAM_BLOCKS","value":"mainnet-blocks-data-hml"},{"name":"KINESIS_STREAM_TRANSACTIONS","value":"mainnet-transactions-data-hml"},{"name":"KINESIS_STREAM_DECODED","value":"mainnet-transactions-decoded-hml"},{"name":"NETWORK","value":"mainnet"},{"name":"SSM_ETHERSCAN_PATH","value":"/etherscan-api-keys"}],"logConfiguration":{"logDriver":"awslogs","options":{"awslogs-group":"/apps/dm-chain-explorer-hml","awslogs-region":$region,"awslogs-stream-prefix":$svc}}}]}')") \
              --query 'taskDefinition.taskDefinitionArn' --output text
            aws ecs run-task \
              --cluster "${{ env.HML_ECS_CLUSTER }}" --task-definition "hml-${SVC}" \
              --launch-type FARGATE \
              --network-configuration "awsvpcConfiguration={subnets=[$SUBNET],securityGroups=[$HML_SG],assignPublicIp=ENABLED}" \
              --count 1 --query 'tasks[0].taskArn' --output text
            echo "Launched: hml-${SVC}"
          done
      - uses: actions/checkout@v4
      - name: Run HML integration test
        id: monitor
        env:
          ENV: hml
          REGION: ${{ env.AWS_REGION }}
          S3_BUCKET: dm-chain-explorer-hml-lakehouse
          DYNAMODB_TABLE: dm-chain-explorer-hml
          KINESIS_STREAM_BLOCKS: mainnet-blocks-data-hml
          KINESIS_STREAM_TRANSACTIONS: mainnet-transactions-data-hml
          KINESIS_STREAM_DECODED: mainnet-transactions-decoded-hml
          SQS_QUEUE_MINED_BLOCKS: mainnet-mined-blocks-events-hml
          SQS_QUEUE_TXS_HASH_IDS: mainnet-block-txs-hash-id-hml
          WAIT_PHASE1_SECS: "180"
          WAIT_PHASE2_SECS: "480"
        run: |
          if bash scripts/hml_integration_test.sh 2>&1 | tee /tmp/hml_test_output.txt; then
            echo "test_passed=true" >> $GITHUB_OUTPUT
            echo "✅ HML integration test PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "test_passed=false" >> $GITHUB_OUTPUT
            echo "❌ HML integration test FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  stream-hml-teardown:
    name: Stream — Teardown HML
    needs: [stream-check-idempotency, stream-hml-provision, stream-hml-integration-test]
    if: |
      always() &&
      github.event.inputs.app_type == 'streaming-apps' &&
      needs.stream-check-idempotency.outputs.skip != 'true' &&
      needs.stream-hml-provision.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Teardown HML environment
        run: bash "$GITHUB_WORKSPACE/scripts/ci/hml_teardown.sh"
        env:
          HML_SG_ID: ${{ needs.stream-hml-provision.outputs.hml_sg_id }}

  stream-prod-deploy:
    name: Stream — Deploy to Production
    needs: [stream-check-idempotency, stream-build-rc, stream-hml-integration-test, stream-hml-teardown]
    if: |
      github.event.inputs.app_type == 'streaming-apps' &&
      needs.stream-check-idempotency.outputs.skip != 'true' &&
      needs.stream-hml-integration-test.outputs.test_passed == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Resolve ECR registry & tags
        id: meta
        run: |
          ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_TAG="${{ needs.stream-check-idempotency.outputs.image_tag }}"
          echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE_TAG"       >> $GITHUB_OUTPUT
      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin "${{ steps.meta.outputs.ecr_registry }}"
      - name: Promote RC → release
        run: |
          RC_IMAGE="${{ needs.stream-build-rc.outputs.ecr_registry }}/${{ env.ECR_REPO }}:${{ needs.stream-build-rc.outputs.rc_tag }}"
          REL_IMAGE="${{ steps.meta.outputs.ecr_registry }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}"
          LAT_IMAGE="${{ steps.meta.outputs.ecr_registry }}/${{ env.ECR_REPO }}:latest"
          VER_IMAGE="${{ steps.meta.outputs.ecr_registry }}/${{ env.ECR_REPO }}:v${{ needs.stream-check-idempotency.outputs.version }}"
          docker pull "$RC_IMAGE"
          docker tag  "$RC_IMAGE" "$REL_IMAGE"
          docker tag  "$RC_IMAGE" "$LAT_IMAGE"
          docker tag  "$RC_IMAGE" "$VER_IMAGE"
          docker push "$REL_IMAGE"
          docker push "$LAT_IMAGE"
          docker push "$VER_IMAGE"
          echo "Docker image tagged: v${{ needs.stream-check-idempotency.outputs.version }}"
      - name: Update ECS task definitions & force deploy
        run: |
          RELEASE_IMG="${{ steps.meta.outputs.ecr_registry }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.image_tag }}"
          for SVC in dm-mined-blocks-watcher dm-orphan-blocks-watcher dm-block-data-crawler dm-mined-txs-crawler dm-txs-input-decoder; do
            TASK_DEF=$(aws ecs describe-task-definition --task-definition "$SVC" --query 'taskDefinition' --output json)
            NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg img "$RELEASE_IMG" \
              '.containerDefinitions[0].image = $img | del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.placementConstraints,.compatibilities,.registeredAt,.registeredBy)')
            NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query 'taskDefinition.taskDefinitionArn' --output text)
            aws ecs update-service --cluster "${{ env.ECS_CLUSTER }}" --service "$SVC" \
              --task-definition "$NEW_TASK_ARN" --force-new-deployment --query 'service.serviceName'
          done
      - name: Wait for ECS services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services dm-mined-blocks-watcher dm-orphan-blocks-watcher dm-block-data-crawler dm-mined-txs-crawler dm-txs-input-decoder \
            --region "${{ env.AWS_REGION }}"
          echo "## Production Deploy Complete — streaming-apps" >> $GITHUB_STEP_SUMMARY
      - name: Create and push release git tag
        run: |
          VERSION="${{ needs.stream-check-idempotency.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION} — onchain-stream-txs deployed to prod"
          git push origin "v${VERSION}"
          echo "Git tag: \`v${VERSION}\`" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════
  #  DATABRICKS DABs
  # ══════════════════════════════════════════════════════════════

  dabs-check-infra:
    name: DABs — Check PRD Databricks workspace
    needs: branch-guard
    if: github.event.inputs.app_type == 'databricks-dabs'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            sa-east-1
      - name: Verify Databricks workspace is reachable
        run: bash "$GITHUB_WORKSPACE/scripts/ci/check_infra_prerequisites.sh"
        env:
          APP_TYPE: databricks-dabs
          DATABRICKS_PROD_HOST: ${{ secrets.DATABRICKS_PROD_HOST }}

  dabs-check-version:
    name: DABs — Check version
    needs: [branch-guard]
    if: github.event.inputs.app_type == 'databricks-dabs'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ver
        run: bash "$GITHUB_WORKSPACE/scripts/ci/check_app_version.sh"
        env:
          TAG_SUFFIX: "-dabs"

  dabs-validate:
    name: DABs — Validate bundle
    needs: dabs-check-version
    if: github.event.inputs.app_type == 'databricks-dabs'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.DABS_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@v0.218.0
      - name: Validate bundle
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: databricks bundle validate --target hml

  dabs-deploy-hml:
    name: DABs — Deploy to HML
    needs: [dabs-validate, dabs-check-version]
    if: github.event.inputs.app_type == 'databricks-dabs'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.DABS_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@v0.218.0
      - name: Deploy bundle to HML
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: databricks bundle deploy --target hml
      - name: Verify HML deployment
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: |
          databricks pipelines list --output json | jq '.[] | .name'
          databricks jobs list --output json | jq '.jobs[] | .settings.name'
          echo "## HML Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "Target: \`hml\` | Version: \`${{ needs.dabs-check-version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  dabs-hml-integration-test:
    name: DABs — HML DLT integration test
    needs: dabs-deploy-hml
    if: github.event.inputs.app_type == 'databricks-dabs'
    runs-on: ubuntu-latest
    outputs:
      test_passed: ${{ steps.validate.outputs.test_passed }}
    defaults:
      run:
        working-directory: ${{ env.DABS_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@v0.218.0
      - name: Trigger pipeline_ethereum
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: databricks bundle run --target hml dm-trigger-dlt-ethereum 2>&1 | tee /tmp/dlt_ethereum.log
      - name: Trigger pipeline_app_logs
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: databricks bundle run --target hml dm-trigger-dlt-app-logs 2>&1 | tee /tmp/dlt_app_logs.log
      - name: Discover SQL Warehouse ID
        id: warehouse
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: |
          WH_ID=$(databricks warehouses list --output json 2>/dev/null | jq -r '.warehouses[0].id // empty') || WH_ID=""
          if [ -z "$WH_ID" ]; then echo "::error::No SQL Warehouse found."; exit 1; fi
          echo "warehouse_id=$WH_ID" >> $GITHUB_OUTPUT
      - name: Validate Gold MVs
        id: validate
        working-directory: ${{ github.workspace }}
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          CATALOG:          hml
          WAREHOUSE_ID:     ${{ steps.warehouse.outputs.warehouse_id }}
        run: |
          if bash scripts/hml_dlt_integration_test.sh 2>&1 | tee /tmp/dlt_test_output.txt; then
            echo "test_passed=true" >> $GITHUB_OUTPUT
            echo "✅ HML DLT integration test PASSED" >> $GITHUB_STEP_SUMMARY
          else
            echo "test_passed=false" >> $GITHUB_OUTPUT
            echo "❌ HML DLT integration test FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

  dabs-deploy-prod:
    name: DABs — Deploy to Production
    needs: [dabs-check-version, dabs-check-infra, dabs-hml-integration-test]
    if: github.event.inputs.app_type == 'databricks-dabs'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.DABS_PATH }}
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@v0.218.0
      - name: Deploy bundle to PROD
        env:
          DATABRICKS_HOST:          ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: databricks bundle deploy --target prod
      - name: Verify PROD deployment
        env:
          DATABRICKS_HOST:          ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
        run: |
          databricks pipelines list --output json | jq '.[] | .name'
          databricks jobs list --output json | jq '.jobs[] | .settings.name'
      - name: Create and push release git tag
        working-directory: ${{ github.workspace }}
        run: |
          VERSION="${{ needs.dabs-check-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}-dabs" -m "Release v${VERSION} — DABs deployed to PROD"
          git push origin "v${VERSION}-dabs"
          echo "## Production Deploy Complete — databricks-dabs" >> $GITHUB_STEP_SUMMARY
          echo "Git tag: \`v${VERSION}-dabs\`" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════
  #  LAMBDA FUNCTIONS
  # ══════════════════════════════════════════════════════════════

  lambda-check-infra:
    name: Lambda — Check PRD infra prerequisites
    needs: branch-guard
    if: github.event.inputs.app_type == 'lambda-functions'
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Verify Lambda infra prerequisites
        run: bash "$GITHUB_WORKSPACE/scripts/ci/check_infra_prerequisites.sh"
        env:
          APP_TYPE: lambda-functions

  lambda-check-version:
    name: Lambda — Check version
    needs: [branch-guard, lambda-check-infra]
    if: github.event.inputs.app_type == 'lambda-functions'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: ver
        run: bash "$GITHUB_WORKSPACE/scripts/ci/check_app_version.sh"
        env:
          TAG_SUFFIX: "-lambda"

  lambda-build-artifacts:
    name: Lambda — Build artifacts
    needs: lambda-check-version
    if: github.event.inputs.app_type == 'lambda-functions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run unit tests
        run: |
          pip install --upgrade pip && pip install "${{ env.UTILS_DIR }}/[dev]"
          pytest ${{ env.UTILS_DIR }}/tests/unit/ -v --tb=short
      - name: Build Lambda layer zip
        run: |
          LAYER_DIR=$(mktemp -d)
          pip install --target "${LAYER_DIR}/python/lib/python3.12/site-packages" "${{ env.UTILS_DIR }}/" -q
          cd "${LAYER_DIR}" && zip -r9 "${GITHUB_WORKSPACE}/dm_chain_utils_layer.zip" python/ -q
          echo "Layer zip: $(du -h ${GITHUB_WORKSPACE}/dm_chain_utils_layer.zip | cut -f1)"
      - name: Build handler zips (HML test only)
        run: |
          cd "${GITHUB_WORKSPACE}/${{ env.LAMBDA_DIR }}/contracts_ingestion" && zip -j "${GITHUB_WORKSPACE}/contracts_ingestion.zip" handler.py
          cd "${GITHUB_WORKSPACE}/${{ env.LAMBDA_DIR }}/gold_to_dynamodb" && zip -j "${GITHUB_WORKSPACE}/gold_to_dynamodb.zip" handler.py
      - uses: actions/upload-artifact@v4
        with:
          name: lambda-artifacts
          path: |
            dm_chain_utils_layer.zip
            contracts_ingestion.zip
            gold_to_dynamodb.zip
          retention-days: 3

  lambda-hml-test:
    name: Lambda — HML test
    needs: [lambda-check-version, lambda-build-artifacts]
    if: github.event.inputs.app_type == 'lambda-functions'
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.set-result.outputs.test_result }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: lambda-artifacts
      - name: Read PRD Terraform outputs
        id: tf-outputs
        run: |
          DYNAMODB_TABLE=$(aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/prd/peripherals/terraform.tfstate - 2>/dev/null \
            | jq -r '.outputs.dynamodb_table_name.value // empty') || DYNAMODB_TABLE=""
          RAW_BUCKET=$(aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/prd/peripherals/terraform.tfstate - 2>/dev/null \
            | jq -r '.outputs.raw_bucket_name.value // empty') || RAW_BUCKET=""
          CW_LOG_GROUP=$(aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/prd/peripherals/terraform.tfstate - 2>/dev/null \
            | jq -r '.outputs.cloudwatch_log_group_name.value // empty') || CW_LOG_GROUP=""
          LAKEHOUSE_BUCKET=$(aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/prd/peripherals/terraform.tfstate - 2>/dev/null \
            | jq -r '.outputs.databricks_bucket_name.value // empty') || LAKEHOUSE_BUCKET=""
          echo "dynamodb_table=${DYNAMODB_TABLE}"     >> $GITHUB_OUTPUT
          echo "raw_bucket=${RAW_BUCKET}"             >> $GITHUB_OUTPUT
          echo "cw_log_group=${CW_LOG_GROUP}"         >> $GITHUB_OUTPUT
          echo "lakehouse_bucket=${LAKEHOUSE_BUCKET}" >> $GITHUB_OUTPUT
          if [ -z "$DYNAMODB_TABLE" ] || [ -z "$RAW_BUCKET" ]; then
            echo "::error::Required TF state outputs missing. Ensure PRD infra (04_peripherals) is deployed."
            exit 1
          fi
      - name: Publish HML test layer
        id: hml-layer
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "hml-dm-chain-utils-${{ github.run_id }}" \
            --zip-file fileb://dm_chain_utils_layer.zip \
            --compatible-runtimes python3.12 \
            --query 'LayerVersionArn' --output text)
          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
      - name: Deploy + invoke HML contracts_ingestion
        id: deploy-ci
        run: |
          FUNC_NAME="hml-contracts-ingestion-${{ github.run_id }}"
          ROLE_ARN=$(aws iam get-role --role-name "${{ env.PRD_LAMBDA_ROLE }}" --query 'Role.Arn' --output text)
          aws lambda create-function --function-name "$FUNC_NAME" --runtime python3.12 \
            --handler handler.handler --role "$ROLE_ARN" \
            --zip-file fileb://contracts_ingestion.zip \
            --layers "${{ steps.hml-layer.outputs.layer_arn }}" \
            --timeout 30 --memory-size 256 \
            --environment "{\"Variables\":{\"S3_BUCKET\":\"${{ steps.tf-outputs.outputs.raw_bucket }}\",\"DYNAMODB_TABLE\":\"${{ steps.tf-outputs.outputs.dynamodb_table }}\",\"SSM_ETHERSCAN_PATH\":\"/etherscan-api-keys\",\"NETWORK\":\"mainnet\",\"S3_BUCKET_PREFIX\":\"hml-test\",\"CLOUDWATCH_LOG_GROUP\":\"${{ steps.tf-outputs.outputs.cw_log_group }}\"}}" \
            --query 'FunctionArn' --output text
          aws lambda wait function-active-v2 --function-name "$FUNC_NAME"
          INVOKE_META=$(aws lambda invoke --function-name "$FUNC_NAME" --payload '{"dry_run": true}' /tmp/ci-response.json) || INVOKE_META="{}"
          FUNC_ERROR=$(echo "$INVOKE_META" | jq -r '.FunctionError // empty')
          cat /tmp/ci-response.json 2>/dev/null || true
          if [ -n "$FUNC_ERROR" ]; then echo "::error::FunctionError: $FUNC_ERROR"; exit 1; fi
          ETH_KEYS=$(cat /tmp/ci-response.json 2>/dev/null | jq -r '.body // "{}"' | jq -r '.etherscan_keys // 0')
          if [ "$ETH_KEYS" -lt 1 ]; then echo "::error::No Etherscan keys found in SSM."; exit 1; fi
          echo "contracts_ingestion dry_run: etherscan_keys=$ETH_KEYS ✅"
          echo "func_name=$FUNC_NAME" >> $GITHUB_OUTPUT
      - name: Deploy + invoke HML gold_to_dynamodb
        id: deploy-gld
        run: |
          RUN_ID="${{ github.run_id }}"
          FUNC_NAME="hml-gold-to-dynamodb-${RUN_ID}"
          ROLE_ARN=$(aws iam get-role --role-name "${{ env.PRD_LAMBDA_ROLE }}" --query 'Role.Arn' --output text)
          BUCKET="${{ steps.tf-outputs.outputs.lakehouse_bucket }}"
          FIXTURE_KEY="exports/gold_api_keys/hml-test-${RUN_ID}.json"
          echo '{"source":"hml-test","api_key_name":"test-key-001","calls_total":42,"calls_ok_total":40,"calls_error_total":2,"calls_24h":10,"vendor":"etherscan","computed_at":"2026-01-01T00:00:00"}' \
            | aws s3 cp - "s3://${BUCKET}/${FIXTURE_KEY}" --content-type "application/json"
          aws lambda create-function --function-name "$FUNC_NAME" --runtime python3.12 \
            --handler handler.handler --role "$ROLE_ARN" \
            --zip-file fileb://gold_to_dynamodb.zip --timeout 30 --memory-size 128 \
            --environment "{\"Variables\":{\"DYNAMODB_TABLE\":\"${{ steps.tf-outputs.outputs.dynamodb_table }}\"}}" \
            --query 'FunctionArn' --output text
          aws lambda wait function-active-v2 --function-name "$FUNC_NAME"
          PAYLOAD=$(jq -n --arg bucket "$BUCKET" --arg key "$FIXTURE_KEY" '{Records:[{s3:{bucket:{name:$bucket},object:{key:$key}}}]}')
          INVOKE_META=$(aws lambda invoke --function-name "$FUNC_NAME" --payload "$PAYLOAD" /tmp/gld-response.json) || true
          FUNC_ERROR=$(echo "$INVOKE_META" | jq -r '.FunctionError // empty')
          if [ -n "$FUNC_ERROR" ]; then echo "::error::gold_to_dynamodb FunctionError: $FUNC_ERROR"; exit 1; fi
          RECORDS=$(cat /tmp/gld-response.json 2>/dev/null | jq -r '.records_processed // 0')
          if [ "$RECORDS" -lt 1 ]; then echo "::error::0 records processed."; exit 1; fi
          echo "gold_to_dynamodb: $RECORDS record(s) processed ✅"
          echo "func_name=$FUNC_NAME"         >> $GITHUB_OUTPUT
          echo "fixture_key=$FIXTURE_KEY"     >> $GITHUB_OUTPUT
          echo "lakehouse_bucket=$BUCKET"     >> $GITHUB_OUTPUT
      - name: Set overall test result
        id: set-result
        run: echo "test_result=passed" >> $GITHUB_OUTPUT
      - name: HML Teardown
        if: always()
        run: |
          RUN_ID="${{ github.run_id }}"
          TABLE="${{ steps.tf-outputs.outputs.dynamodb_table }}"
          BUCKET="${{ steps.deploy-gld.outputs.lakehouse_bucket }}"
          aws lambda delete-function --function-name "hml-contracts-ingestion-${RUN_ID}" 2>/dev/null || true
          aws lambda delete-function --function-name "hml-gold-to-dynamodb-${RUN_ID}"   2>/dev/null || true
          LAYER_NAME="hml-dm-chain-utils-${RUN_ID}"
          VERSIONS=$(aws lambda list-layer-versions --layer-name "$LAYER_NAME" --query 'LayerVersions[].Version' --output json 2>/dev/null || echo '[]')
          for V in $(echo "$VERSIONS" | jq -r '.[]'); do
            aws lambda delete-layer-version --layer-name "$LAYER_NAME" --version-number "$V" 2>/dev/null || true
          done
          [ -n "$BUCKET" ] && aws s3 rm "s3://${BUCKET}/exports/gold_api_keys/hml-test-${RUN_ID}.json" 2>/dev/null || true
          [ -n "$TABLE" ] && aws dynamodb delete-item --table-name "$TABLE" \
            --key '{"pk":{"S":"CONSUMPTION"},"sk":{"S":"hml-test#test-key-001"}}' 2>/dev/null || true

  lambda-prod-deploy:
    name: Lambda — Deploy to Production
    needs: [lambda-check-version, lambda-build-artifacts, lambda-hml-test]
    if: github.event.inputs.app_type == 'lambda-functions' && needs.lambda-hml-test.outputs.test_result == 'passed'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: lambda-artifacts
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Stage layer zip for Terraform
        run: |
          mkdir -p ${{ env.PRD_TF_LAMBDA }}/.lambda_zip
          cp dm_chain_utils_layer.zip ${{ env.PRD_TF_LAMBDA }}/.lambda_zip/
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Terraform init & apply
        working-directory: ${{ env.PRD_TF_LAMBDA }}
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
        run: |
          terraform init -input=false
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
          echo "### Lambda Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -20 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
          terraform apply -input=false -auto-approve tfplan
      - name: Create and push release git tag
        run: |
          VERSION="${{ needs.lambda-check-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}-lambda" -m "Release v${VERSION} — Lambda functions deployed to PROD"
          git push origin "v${VERSION}-lambda"
          echo "## Production Deploy Complete — lambda-functions" >> $GITHUB_STEP_SUMMARY
          echo "Git tag: \`v${VERSION}-lambda\`" >> $GITHUB_STEP_SUMMARY
