      - name: Alert on drift
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: |
          echo "::error::DRIFT DETECTED in PRD/ECS — unexpected pending changes found."
          exit 1

  # ── Summary ──────────────────────────────────────────────────────────────

  drift-summary:
    name: Drift Summary
    needs:
      - drift-dev-peripherals
      - drift-dev-lambda
      - drift-prd-vpc
      - drift-prd-iam
      - drift-prd-peripherals
      - drift-prd-lambda
      - drift-prd-ecs
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report drift results
        run: |
          echo "## Drift Detection Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Module | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| DEV/Peripherals | ${{ needs.drift-dev-peripherals.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| DEV/Lambda      | ${{ needs.drift-dev-lambda.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PRD/VPC         | ${{ needs.drift-prd-vpc.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PRD/IAM         | ${{ needs.drift-prd-iam.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PRD/Peripherals | ${{ needs.drift-prd-peripherals.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PRD/Lambda      | ${{ needs.drift-prd-lambda.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| PRD/ECS         | ${{ needs.drift-prd-ecs.result }} |" >> "$GITHUB_STEP_SUMMARY"
