# DEV environment — shared config for all onchain-stream-txs containers

# DynamoDB (single-table design)
DYNAMODB_TABLE=dm-chain-explorer

# CloudWatch log group
CLOUDWATCH_LOG_GROUP=/apps/dm-chain-explorer-dev

# Network
NETWORK=mainnet

# SQS queue URLs (DEV)
SQS_QUEUE_URL_MINED_BLOCKS=https://sqs.sa-east-1.amazonaws.com/016098071081/mainnet-mined-blocks-events-dev
SQS_QUEUE_URL_TXS_HASH_IDS=https://sqs.sa-east-1.amazonaws.com/016098071081/mainnet-block-txs-hash-id-dev

# Kinesis stream names (DEV)
KINESIS_STREAM_BLOCKS=mainnet-blocks-data-dev
KINESIS_STREAM_TRANSACTIONS=mainnet-transactions-data-dev
KINESIS_STREAM_DECODED=mainnet-transactions-decoded-dev
