name: CI – Terraform Plan (PRD)

on:
  pull_request:
    paths:
      - 'services/prd/terraform/**'

env:
  AWS_REGION: sa-east-1
  TF_ROOT:    services/prd/terraform

jobs:
  # ----------------------------------------------------------------
  # Detect which Terraform modules changed
  # ----------------------------------------------------------------
  detect-modules:
    name: Detect changed Terraform modules
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed modules
        id: detect
        run: |
          ALL_MODULES=(0_remote_state 1_vpc 2_iam 3_msk 4_s3 6_ecs 7_databricks 8_elasticache)
          CHANGED=()
          for MOD in "${ALL_MODULES[@]}"; do
            if git diff --name-only origin/${{ github.base_ref }}...HEAD \
                | grep -q "services/prd/terraform/${MOD}/"; then
              CHANGED+=("\"${MOD}\"")
            fi
          done
          # If root *.tf files changed, plan all modules
          if git diff --name-only origin/${{ github.base_ref }}...HEAD \
              | grep -qE "services/prd/terraform/[^/]+\.tf$"; then
            for MOD in "${ALL_MODULES[@]}"; do
              CHANGED+=("\"${MOD}\"")
            done
          fi
          # Deduplicate
          UNIQUE=($(echo "${CHANGED[@]}" | tr ' ' '\n' | sort -u | tr '\n' ' '))
          if [ ${#UNIQUE[@]} -eq 0 ]; then
            MATRIX="[]"
          else
            MATRIX="[$(IFS=,; echo "${UNIQUE[*]}")]"
          fi
          echo "modules=$MATRIX" >> $GITHUB_OUTPUT
          echo "Changed modules: $MATRIX"

  # ----------------------------------------------------------------
  # Terraform init / validate / plan (matrix per module)
  # ----------------------------------------------------------------
  terraform-plan:
    name: Plan – ${{ matrix.module }}
    needs: detect-modules
    if: needs.detect-modules.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJson(needs.detect-modules.outputs.modules) }}

    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Init
        id: init
        run: terraform init -input=false

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan.binary 2>&1 | tee plan.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const planText = fs.existsSync('${{ env.TF_ROOT }}/${{ matrix.module }}/plan.txt')
              ? fs.readFileSync('${{ env.TF_ROOT }}/${{ matrix.module }}/plan.txt', 'utf8')
              : '(plan output not available)';
            const truncated = planText.length > 60000
              ? planText.slice(0, 60000) + '\n...(truncated)'
              : planText;
            const outcome = '${{ steps.plan.outcome }}';
            const icon = outcome === 'success' ? '✅' : '❌';
            const body = [
              `### ${icon} Terraform Plan — \`${{ matrix.module }}\``,
              '',
              '<details><summary>Show plan</summary>',
              '',
              '```hcl',
              truncated,
              '```',
              '</details>',
            ].join('\n');
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
