  drift-prd-lambda:
    name: Drift — PRD/Lambda
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/prd/06_lambda
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
