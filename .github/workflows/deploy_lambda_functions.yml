name: Deploy Lambda Functions

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  AWS_REGION:          sa-east-1
  TF_VERSION:          1.7.0
  LAMBDA_DIR:          lambda
  UTILS_DIR:           utils
  PRD_TF_LAMBDA:       services/prd/10_lambda
  TF_STATE_BUCKET:     dm-chain-explorer-terraform-state
  # IAM role name from Terraform: dm-${project}-${env}-contracts-ingestion-lambda
  # project=dd-chain-explorer, env=prd → dm-dd-chain-explorer-prd-contracts-ingestion-lambda
  PRD_LAMBDA_ROLE:     dm-dd-chain-explorer-prd-contracts-ingestion-lambda

jobs:
  # ----------------------------------------------------------------
  # Branch guard — only allow dispatch from develop
  # ----------------------------------------------------------------
  branch-guard:
    name: Branch guard
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::This workflow must be triggered from the 'develop' branch. Got: ${{ github.ref }}"
            exit 1
          fi
          echo "Branch check passed: ${{ github.ref }}"

  # ----------------------------------------------------------------
  # Infra prerequisite gate — PRD Lambda infra must exist
  #
  # Checks that the Lambda IAM role and DynamoDB table (required
  # env var for Lambda) exist in PRD before proceeding.
  # Prevents deploying if deploy_cloud_infra_prd has not been run.
  # ----------------------------------------------------------------
  check-infra-prd:
    name: Check PRD infra prerequisites
    needs: branch-guard
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Verify Lambda IAM role exists (module 2_iam / 10_lambda)
        run: |
          ROLE_ARN=$(aws iam get-role \
            --role-name "${{ env.PRD_LAMBDA_ROLE }}" \
            --query 'Role.Arn' --output text 2>/dev/null) || ROLE_ARN=""
          if [ -z "$ROLE_ARN" ]; then
            echo "::error::IAM role '${{ env.PRD_LAMBDA_ROLE }}' not found."
            echo "::error::Run 'Deploy Infrastructure PRD' (modules 2_iam + 10_lambda) before deploying Lambda functions."
            exit 1
          fi
          echo "IAM role found: $ROLE_ARN"

      - name: Verify DynamoDB table exists in Terraform state (module 9_dynamodb)
        run: |
          TABLE=$(aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/dynamodb/terraform.tfstate - 2>/dev/null \
            | jq -r '.outputs.dynamodb_table_name.value // empty') || TABLE=""
          if [ -z "$TABLE" ]; then
            echo "::error::DynamoDB table output not found in Terraform state (key: dynamodb/terraform.tfstate)."
            echo "::error::Run 'Deploy Infrastructure PRD' (module 9_dynamodb) before deploying Lambda functions."
            exit 1
          fi
          echo "DynamoDB table confirmed: $TABLE"

  # ----------------------------------------------------------------
  # Version check — fail fast if VERSION was not bumped
  # ----------------------------------------------------------------
  check-version:
    name: Check version bump
    needs: [branch-guard, check-infra-prd]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read and validate VERSION
        id: ver
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Project version: $VERSION"
          if git tag --list | grep -qx "v${VERSION}-lambda"; then
            echo "::error::Version v${VERSION}-lambda is already tagged. Bump VERSION before deploying."
            exit 1
          fi
          echo "Version v${VERSION}-lambda is new — proceeding."

  # ----------------------------------------------------------------
  # Build artifacts — layer zip + handler zips
  #
  # dm_chain_utils_layer.zip: used by aws_lambda_layer_version in
  #   Terraform. Must be pre-built (not auto-generated by TF).
  #
  # contracts_ingestion.zip + gold_to_dynamodb.zip: used only for
  #   HML testing. In prod-deploy, Terraform's archive_file data
  #   source re-creates handler zips from source .py files directly.
  # ----------------------------------------------------------------
  build-artifacts:
    name: Build Lambda artifacts
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run unit tests
        run: |
          pip install --upgrade pip
          pip install "${{ env.UTILS_DIR }}/[dev]"
          pytest ${{ env.UTILS_DIR }}/tests/unit/ -v --tb=short

      - name: Build Lambda layer zip (dm_chain_utils + deps)
        run: |
          LAYER_DIR=$(mktemp -d)
          pip install --target "${LAYER_DIR}/python/lib/python3.12/site-packages" \
            "${{ env.UTILS_DIR }}/" -q
          cd "${LAYER_DIR}"
          zip -r9 "${GITHUB_WORKSPACE}/dm_chain_utils_layer.zip" python/ -q
          echo "Layer zip size: $(du -h ${GITHUB_WORKSPACE}/dm_chain_utils_layer.zip | cut -f1)"

      - name: Build handler zips (for HML test only)
        run: |
          cd "${GITHUB_WORKSPACE}/${{ env.LAMBDA_DIR }}/contracts_ingestion"
          zip -j "${GITHUB_WORKSPACE}/contracts_ingestion.zip" handler.py
          cd "${GITHUB_WORKSPACE}/${{ env.LAMBDA_DIR }}/gold_to_dynamodb"
          zip -j "${GITHUB_WORKSPACE}/gold_to_dynamodb.zip" handler.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lambda-artifacts
          path: |
            dm_chain_utils_layer.zip
            contracts_ingestion.zip
            gold_to_dynamodb.zip
          retention-days: 3

  # ----------------------------------------------------------------
  # HML Test — ephemeral Lambda deploy + invocation validation
  #
  # Uses PRD IAM role to create temporary Lambda functions, publishes
  # the layer, invokes a dry-run payload, then always tears down.
  # State keys match 10_lambda/main.tf remote_state references.
  # ----------------------------------------------------------------
  hml-test:
    name: HML Lambda test
    needs: [check-version, build-artifacts]
    runs-on: ubuntu-latest
    outputs:
      test_result: ${{ steps.set-result.outputs.test_result }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-artifacts

      - name: Read PRD Terraform outputs for HML test config
        id: tf-outputs
        run: |
          # State keys match those referenced in 10_lambda/main.tf
          DYNAMODB_TABLE=$(aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/dynamodb/terraform.tfstate - 2>/dev/null \
            | jq -r '.outputs.dynamodb_table_name.value // empty') || DYNAMODB_TABLE=""
          RAW_BUCKET=$(aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/s3/terraform.tfstate - 2>/dev/null \
            | jq -r '.outputs.raw_bucket_name.value // empty') || RAW_BUCKET=""
          CW_LOG_GROUP=$(aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/kinesis_sqs/terraform.tfstate - 2>/dev/null \
            | jq -r '.outputs.cloudwatch_log_group_name.value // empty') || CW_LOG_GROUP=""

          echo "dynamodb_table=${DYNAMODB_TABLE}" >> $GITHUB_OUTPUT
          echo "raw_bucket=${RAW_BUCKET}"          >> $GITHUB_OUTPUT
          echo "cw_log_group=${CW_LOG_GROUP}"      >> $GITHUB_OUTPUT
          echo "DynamoDB: $DYNAMODB_TABLE | S3: $RAW_BUCKET | CW: $CW_LOG_GROUP"

          if [ -z "$DYNAMODB_TABLE" ] || [ -z "$RAW_BUCKET" ]; then
            echo "::error::Required TF state outputs missing (dynamodb/s3). Ensure PRD infra is fully deployed."
            exit 1
          fi

      - name: Get PRD Lambda execution role ARN
        id: role
        run: |
          ROLE_ARN=$(aws iam get-role \
            --role-name "${{ env.PRD_LAMBDA_ROLE }}" \
            --query 'Role.Arn' --output text)
          echo "role_arn=$ROLE_ARN" >> $GITHUB_OUTPUT
          echo "Using IAM role: $ROLE_ARN"

      - name: Publish HML test layer
        id: hml-layer
        run: |
          LAYER_ARN=$(aws lambda publish-layer-version \
            --layer-name "hml-dm-chain-utils-${{ github.run_id }}" \
            --zip-file fileb://dm_chain_utils_layer.zip \
            --compatible-runtimes python3.12 \
            --query 'LayerVersionArn' --output text)
          echo "layer_arn=$LAYER_ARN" >> $GITHUB_OUTPUT
          echo "HML layer: $LAYER_ARN"

      - name: Deploy HML contracts_ingestion function
        id: deploy
        run: |
          FUNC_NAME="hml-contracts-ingestion-${{ github.run_id }}"
          echo "func_name=$FUNC_NAME" >> $GITHUB_OUTPUT

          aws lambda create-function \
            --function-name "$FUNC_NAME" \
            --runtime python3.12 \
            --handler handler.handler \
            --role "${{ steps.role.outputs.role_arn }}" \
            --zip-file fileb://contracts_ingestion.zip \
            --layers "${{ steps.hml-layer.outputs.layer_arn }}" \
            --timeout 30 \
            --memory-size 256 \
            --environment "{\"Variables\":{\"S3_BUCKET\":\"${{ steps.tf-outputs.outputs.raw_bucket }}\",\"DYNAMODB_TABLE\":\"${{ steps.tf-outputs.outputs.dynamodb_table }}\",\"SSM_ETHERSCAN_PATH\":\"/etherscan-api-keys\",\"NETWORK\":\"mainnet\",\"S3_BUCKET_PREFIX\":\"hml-test\",\"CLOUDWATCH_LOG_GROUP\":\"${{ steps.tf-outputs.outputs.cw_log_group }}\"}}" \
            --query 'FunctionArn' --output text

          echo "Waiting for function to become active..."
          aws lambda wait function-active-v2 --function-name "$FUNC_NAME"

      - name: Invoke and validate contracts_ingestion (dry-run)
        id: invoke
        run: |
          FUNC_NAME="${{ steps.deploy.outputs.func_name }}"
          echo "Invoking $FUNC_NAME with dry_run=true..."

          INVOKE_META=$(aws lambda invoke \
            --function-name "$FUNC_NAME" \
            --payload '{"dry_run": true}' \
            /tmp/lambda-response.json) || INVOKE_META="{}"

          HTTP_CODE=$(echo "$INVOKE_META" | jq -r '.StatusCode // 0')
          FUNC_ERROR=$(echo "$INVOKE_META" | jq -r '.FunctionError // empty')

          echo "HTTP status: $HTTP_CODE"
          echo "Function response:"
          cat /tmp/lambda-response.json 2>/dev/null || true

          if [ -n "$FUNC_ERROR" ]; then
            echo "::error::contracts_ingestion FunctionError: $FUNC_ERROR"
            echo "test_result=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          # dry_run: SSM key absence is a hard fail; 0 contracts is a warning only
          BODY=$(cat /tmp/lambda-response.json 2>/dev/null | jq -r '.body // "{}"')
          ETH_KEYS=$(echo "$BODY" | jq -r '.etherscan_keys // 0')
          if [ "$ETH_KEYS" -lt 1 ]; then
            echo "::error::dry_run: no Etherscan keys found in SSM — cannot proceed."
            echo "test_result=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

          echo "contracts_ingestion dry_run: etherscan_keys=$ETH_KEYS ✅"
          echo "## HML Lambda Test — contracts_ingestion" >> $GITHUB_STEP_SUMMARY
          echo "Function: \`$FUNC_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "HTTP status: $HTTP_CODE | FunctionError: none | Etherscan keys: $ETH_KEYS ✅" >> $GITHUB_STEP_SUMMARY

      # ----------------------------------------------------------------
      # gold_to_dynamodb HML test — fixture-based
      # Upload a test JSON to S3, invoke with mock S3 event,
      # verify DynamoDB CONSUMPTION item, then teardown.
      # ----------------------------------------------------------------
      - name: Read S3 lakehouse bucket from TF state
        id: s3-lakehouse
        run: |
          LAKEHOUSE_BUCKET=$(aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/s3/terraform.tfstate - 2>/dev/null \
            | jq -r '.outputs.databricks_bucket_name.value // empty') || LAKEHOUSE_BUCKET=""
          if [ -z "$LAKEHOUSE_BUCKET" ]; then
            echo "::error::databricks_bucket_name not found in TF state (s3/terraform.tfstate). Ensure PRD infra is deployed."
            exit 1
          fi
          echo "lakehouse_bucket=$LAKEHOUSE_BUCKET" >> $GITHUB_OUTPUT
          echo "Lakehouse bucket: $LAKEHOUSE_BUCKET"

      - name: Upload gold_to_dynamodb fixture to S3
        id: fixture
        run: |
          RUN_ID="${{ github.run_id }}"
          BUCKET="${{ steps.s3-lakehouse.outputs.lakehouse_bucket }}"
          FIXTURE_KEY="exports/gold_api_keys/hml-test-${RUN_ID}.json"
          FIXTURE_CONTENT='{"source":"hml-test","api_key_name":"test-key-001","calls_total":42,"calls_ok_total":40,"calls_error_total":2,"calls_24h":10,"vendor":"etherscan","computed_at":"2026-01-01T00:00:00"}'

          echo "$FIXTURE_CONTENT" | aws s3 cp - "s3://${BUCKET}/${FIXTURE_KEY}" \
            --content-type "application/json"
          echo "fixture_key=$FIXTURE_KEY" >> $GITHUB_OUTPUT
          echo "Uploaded fixture: s3://${BUCKET}/${FIXTURE_KEY}"

      - name: Deploy HML gold_to_dynamodb function
        id: deploy-gld
        run: |
          RUN_ID="${{ github.run_id }}"
          FUNC_NAME="hml-gold-to-dynamodb-${RUN_ID}"
          echo "func_name=$FUNC_NAME" >> $GITHUB_OUTPUT

          # gold_to_dynamodb has no external deps — no layer needed
          ROLE_ARN=$(aws iam get-role \
            --role-name "${{ env.PRD_LAMBDA_ROLE }}" \
            --query 'Role.Arn' --output text)

          aws lambda create-function \
            --function-name "$FUNC_NAME" \
            --runtime python3.12 \
            --handler handler.handler \
            --role "$ROLE_ARN" \
            --zip-file fileb://gold_to_dynamodb.zip \
            --timeout 30 \
            --memory-size 128 \
            --environment "{\"Variables\":{\"DYNAMODB_TABLE\":\"${{ steps.tf-outputs.outputs.dynamodb_table }}\"}}" \
            --query 'FunctionArn' --output text

          aws lambda wait function-active-v2 --function-name "$FUNC_NAME"
          echo "gold_to_dynamodb HML function ready: $FUNC_NAME"

      - name: Invoke gold_to_dynamodb with mock S3 event
        id: invoke-gld
        run: |
          FUNC_NAME="${{ steps.deploy-gld.outputs.func_name }}"
          BUCKET="${{ steps.s3-lakehouse.outputs.lakehouse_bucket }}"
          FIXTURE_KEY="${{ steps.fixture.outputs.fixture_key }}"

          PAYLOAD=$(jq -n \
            --arg bucket "$BUCKET" \
            --arg key "$FIXTURE_KEY" \
            '{Records:[{s3:{bucket:{name:$bucket},object:{key:$key}}}]}')

          INVOKE_META=$(aws lambda invoke \
            --function-name "$FUNC_NAME" \
            --payload "$PAYLOAD" \
            /tmp/gld-response.json) || INVOKE_META="{}"

          FUNC_ERROR=$(echo "$INVOKE_META" | jq -r '.FunctionError // empty')
          echo "Function response:"
          cat /tmp/gld-response.json 2>/dev/null || true

          if [ -n "$FUNC_ERROR" ]; then
            echo "::error::gold_to_dynamodb FunctionError: $FUNC_ERROR"
            exit 1
          fi

          RECORDS=$(cat /tmp/gld-response.json 2>/dev/null | jq -r '.records_processed // 0')
          if [ "$RECORDS" -lt 1 ]; then
            echo "::error::gold_to_dynamodb: 0 records processed — fixture may not have been read correctly."
            exit 1
          fi
          echo "gold_to_dynamodb: $RECORDS record(s) processed ✅"

      - name: Verify DynamoDB CONSUMPTION item
        run: |
          TABLE="${{ steps.tf-outputs.outputs.dynamodb_table }}"
          ITEM=$(aws dynamodb get-item \
            --table-name "$TABLE" \
            --key '{"pk":{"S":"CONSUMPTION"},"sk":{"S":"hml-test#test-key-001"}}' \
            --query 'Item' --output json 2>/dev/null || echo 'null')

          if [ "$ITEM" = "null" ] || [ -z "$ITEM" ]; then
            echo "::error::DynamoDB: CONSUMPTION item hml-test#test-key-001 not found after gold_to_dynamodb invocation."
            exit 1
          fi
          echo "DynamoDB CONSUMPTION item verified ✅"
          echo "Item: $ITEM"
          echo "## HML Lambda Test — gold_to_dynamodb" >> $GITHUB_STEP_SUMMARY
          echo "Function: \`${{ steps.deploy-gld.outputs.func_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "DynamoDB item CONSUMPTION#hml-test#test-key-001: found ✅" >> $GITHUB_STEP_SUMMARY

      - name: Set overall test result
        id: set-result
        run: echo "test_result=passed" >> $GITHUB_OUTPUT

      - name: HML Teardown
        if: always()
        run: |
          RUN_ID="${{ github.run_id }}"
          TABLE="${{ steps.tf-outputs.outputs.dynamodb_table }}"
          BUCKET="${{ steps.s3-lakehouse.outputs.lakehouse_bucket }}"

          # Delete ephemeral Lambda functions
          aws lambda delete-function \
            --function-name "hml-contracts-ingestion-${RUN_ID}" 2>/dev/null || true
          aws lambda delete-function \
            --function-name "hml-gold-to-dynamodb-${RUN_ID}" 2>/dev/null || true

          # Delete HML test layer versions
          LAYER_NAME="hml-dm-chain-utils-${RUN_ID}"
          VERSIONS=$(aws lambda list-layer-versions \
            --layer-name "$LAYER_NAME" \
            --query 'LayerVersions[].Version' --output json 2>/dev/null || echo '[]')
          for V in $(echo "$VERSIONS" | jq -r '.[]'); do
            aws lambda delete-layer-version \
              --layer-name "$LAYER_NAME" --version-number "$V" 2>/dev/null || true
          done

          # Delete S3 fixture
          if [ -n "$BUCKET" ]; then
            aws s3 rm "s3://${BUCKET}/exports/gold_api_keys/hml-test-${RUN_ID}.json" 2>/dev/null || true
          fi

          # Delete DynamoDB test item
          if [ -n "$TABLE" ]; then
            aws dynamodb delete-item \
              --table-name "$TABLE" \
              --key '{"pk":{"S":"CONSUMPTION"},"sk":{"S":"hml-test#test-key-001"}}' 2>/dev/null || true
          fi

          echo "HML Lambda resources cleaned up."

  # ----------------------------------------------------------------
  # Deploy to Production — requires manual approval
  # (GitHub Environment: production)
  #
  # IMPORTANT: Only dm_chain_utils_layer.zip needs to be pre-built.
  # Handler zips (contracts_ingestion.zip, gold_to_dynamodb.zip) are
  # auto-generated by Terraform's archive_file data source from the
  # source .py files checked out in the repo. Do NOT copy them here.
  # ----------------------------------------------------------------
  prod-deploy:
    name: Deploy to Production
    needs: [check-version, build-artifacts, hml-test]
    if: needs.hml-test.outputs.test_result == 'passed'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: lambda-artifacts

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Prepare .lambda_zip with layer
        run: |
          # Only the layer zip is required pre-built.
          # Terraform archive_file auto-generates handler zips from source.
          mkdir -p ${{ env.PRD_TF_LAMBDA }}/.lambda_zip
          cp dm_chain_utils_layer.zip ${{ env.PRD_TF_LAMBDA }}/.lambda_zip/
          echo "Layer zip staged: $(ls -lh ${{ env.PRD_TF_LAMBDA }}/.lambda_zip/)"

      - name: Terraform init & apply
        working-directory: ${{ env.PRD_TF_LAMBDA }}
        run: |
          terraform init -input=false
          terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
          echo "### Lambda Terraform Plan" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          tail -20 plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform apply -input=false -auto-approve tfplan

      - name: Show outputs & verify
        working-directory: ${{ env.PRD_TF_LAMBDA }}
        run: |
          echo "### Lambda PRD Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No outputs defined"
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Create and push release git tag
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}-lambda" -m "Release v${VERSION} — Lambda functions deployed to PROD"
          git push origin "v${VERSION}-lambda"
          echo "## Production Deploy Complete" >> $GITHUB_STEP_SUMMARY
          echo "Git tag: \`v${VERSION}-lambda\`" >> $GITHUB_STEP_SUMMARY
