name: Destroy Infra Cloud

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to destroy'
        required: true
        type: choice
        options:
          - DEV (Cloud AWS)
          - prd
      confirm:
        description: 'Type DESTROY to confirm infrastructure destruction'
        required: true
        type: string

permissions:
  contents: read

env:
  AWS_REGION:      sa-east-1
  TF_VERSION:      1.7.0
  PRD_ROOT:        services/prd
  DEV_PERIPHERALS: services/dev/01_peripherals
  DEV_LAMBDA:      services/dev/02_lambda

jobs:

  safety-check:
    name: Safety check
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::Must be triggered from develop. Got: ${{ github.ref }}"
            exit 1
          fi
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "DESTROY" ]; then
            echo "::error::Confirmation must be exactly 'DESTROY'. Got: ${{ github.event.inputs.confirm }}"
            exit 1
          fi

  # ══════════════════════════════════════════════════════════════
  #  DEV
  # ══════════════════════════════════════════════════════════════

  dev-destroy-lambda:
    name: DEV — Destroy 02_lambda
    needs: safety-check
    if: github.event.inputs.environment == 'DEV (Cloud AWS)'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.DEV_LAMBDA }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: mkdir -p .lambda_zip
      - run: terraform init -input=false
      - run: terraform destroy -auto-approve -input=false -no-color
      - if: always()
        run: echo "DEV/02_lambda destroyed - status ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  dev-destroy-peripherals:
    name: DEV — Destroy 01_peripherals
    needs: dev-destroy-lambda
    if: always() && github.event.inputs.environment == 'DEV (Cloud AWS)'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.DEV_PERIPHERALS }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Empty DEV S3 buckets before destroy
        run: |
          chmod +x scripts/empty_s3_bucket.sh
          for BUCKET in dm-chain-explorer-dev-ingestion dm-chain-explorer-dev; do
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              bash scripts/empty_s3_bucket.sh "$BUCKET" "${{ env.AWS_REGION }}"
            else
              echo "Bucket $BUCKET does not exist — skipping."
            fi
          done
        working-directory: ${{ github.workspace }}
      - run: terraform init -input=false
      - run: terraform destroy -auto-approve -input=false -no-color
      - if: always()
        run: echo "DEV/01_peripherals destroyed - status ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  dev-summary:
    name: DEV — Destroy summary
    needs: dev-destroy-peripherals
    if: always() && github.event.inputs.environment == 'DEV (Cloud AWS)'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## DEV Infrastructure Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "Modules destroyed: dev/01_peripherals, dev/02_lambda" >> $GITHUB_STEP_SUMMARY
          echo "Run Deploy Infra Cloud (DEV) to redeploy." >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════
  #  PRD — Step 1: Empty S3 + ECR (required before TF destroy)
  # ══════════════════════════════════════════════════════════════

  prd-empty-s3-and-ecr:
    name: PRD — Empty S3 buckets + ECR repos
    needs: safety-check
    if: github.event.inputs.environment == 'prd'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Empty PRD data buckets
        run: |
          chmod +x scripts/empty_s3_bucket.sh
          for BUCKET in dm-chain-explorer-raw dm-chain-explorer-lakehouse dm-chain-explorer-databricks; do
            if aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null; then
              bash scripts/empty_s3_bucket.sh "$BUCKET" "${{ env.AWS_REGION }}"
            else
              echo "Bucket $BUCKET does not exist — skipping."
            fi
          done
      - name: Empty ECR repositories
        run: |
          for REPO in onchain-stream-txs onchain-batch-txs; do
            IMAGES=$(aws ecr list-images --repository-name "$REPO" --region "${{ env.AWS_REGION }}" \
              --query 'imageIds[*]' --output json 2>/dev/null) || IMAGES="[]"
            if [ "$IMAGES" != "[]" ] && [ -n "$IMAGES" ]; then
              aws ecr batch-delete-image --repository-name "$REPO" \
                --image-ids "$IMAGES" --region "${{ env.AWS_REGION }}" 2>/dev/null || true
              echo "ECR $REPO emptied"
            else
              echo "ECR $REPO is empty or does not exist — skipping."
            fi
          done

  # ── PRD Layer 3: Lambda + ECS (parallel) ──────────────────────

  prd-destroy-lambda:
    name: PRD — Destroy 06_lambda
    needs: prd-empty-s3-and-ecr
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/06_lambda
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: mkdir -p .lambda_zip
      - run: terraform init -input=false
      - run: terraform destroy -auto-approve -input=false -no-color
      - if: always()
        run: echo "PRD/06_lambda destroyed - status ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  prd-destroy-ecs:
    name: PRD — Destroy 07_ecs
    needs: prd-empty-s3-and-ecr
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/07_ecs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform destroy -auto-approve -input=false -no-color
      - if: always()
        run: echo "PRD/07_ecs destroyed - status ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── PRD Layer 2: Databricks ───────────────────────────────────

  prd-destroy-databricks:
    name: PRD — Destroy 05_databricks
    needs: [prd-destroy-lambda, prd-destroy-ecs]
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/05_databricks
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform destroy -auto-approve -input=false -no-color
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      - if: always()
        run: echo "PRD/05_databricks destroyed - status ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── PRD Layer 1: Peripherals ──────────────────────────────────

  prd-destroy-peripherals:
    name: PRD — Destroy 04_peripherals
    needs: [prd-destroy-lambda, prd-destroy-ecs, prd-destroy-databricks]
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/04_peripherals
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform destroy -auto-approve -input=false -no-color
      - if: always()
        run: echo "PRD/04_peripherals destroyed - status ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── PRD Layer 0: IAM ──────────────────────────────────────────

  prd-destroy-iam:
    name: PRD — Destroy 03_iam
    needs: prd-destroy-peripherals
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/03_iam
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform destroy -auto-approve -input=false -no-color
      - if: always()
        run: echo "PRD/03_iam destroyed - status ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── PRD Layer -1: VPC ─────────────────────────────────────────

  prd-destroy-vpc:
    name: PRD — Destroy 02_vpc
    needs: prd-destroy-iam
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/02_vpc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform destroy -auto-approve -input=false -no-color
      - if: always()
        run: echo "PRD/02_vpc destroyed - status ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  prd-summary:
    name: PRD — Destroy summary
    needs: prd-destroy-vpc
    if: always() && github.event.inputs.environment == 'prd'
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "## PRD Infrastructure Destroy Complete" >> $GITHUB_STEP_SUMMARY
          echo "All modules destroyed. 01_tf_state (remote state bucket + DynamoDB lock) preserved." >> $GITHUB_STEP_SUMMARY
          echo "Run Deploy Infra Cloud with force_apply=true to redeploy." >> $GITHUB_STEP_SUMMARY
