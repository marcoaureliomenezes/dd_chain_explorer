resources:
  jobs:
    workflow_maintenance:
      name: "[${bundle.target}] dm-iceberg-maintenance"
      tasks:
        - task_key: optimize_bronze
          notebook_task:
            notebook_path: ../../src/batch/maintenance/1_optimize_bronze.py
            source: WORKSPACE
        - task_key: optimize_silver
          depends_on:
            - task_key: optimize_bronze
          notebook_task:
            notebook_path: ../../src/batch/maintenance/2_optimize_silver.py
            source: WORKSPACE
        - task_key: vacuum_all
          depends_on:
            - task_key: optimize_silver
          notebook_task:
            notebook_path: ../../src/batch/maintenance/3_vacuum_all.py
            source: WORKSPACE
        - task_key: monitor_tables
          depends_on:
            - task_key: vacuum_all
          notebook_task:
            notebook_path: ../../src/batch/maintenance/4_monitor_tables.py
            source: WORKSPACE
      tags:
        layer: maintenance
        project: dd-chain-explorer
