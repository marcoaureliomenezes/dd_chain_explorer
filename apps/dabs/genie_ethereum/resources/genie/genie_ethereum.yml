# Databricks Genie Space — Ethereum Explorer
# Permite consultas ad-hoc em linguagem natural sobre transações, blocos,
# contratos e saúde das API keys da rede Ethereum mainnet.
#
# Deploy: incluído via 'resources/genie/*.yml' no databricks.yml
# Requer: var.warehouse_id configurado (mesmo warehouse dos dashboards)

resources:
  genie_spaces:
    ethereum_explorer:
      display_name: "Ethereum Explorer"
      description: >-
        Consultas em linguagem natural sobre dados da rede Ethereum mainnet.
        Explore transações, blocos, contratos populares, métricas de rede e
        saúde das API keys de forma conversacional.
      warehouse_id: ${var.warehouse_id}

      tables:
        - catalog_name: ${var.catalog}
          schema_name:  s_apps
          table_name:   transactions_fast
          description: "Transações Ethereum processadas em tempo real (streaming). Inclui hash, from/to, value, gas, decode_type e dat_ref."

        - catalog_name: ${var.catalog}
          schema_name:  s_apps
          table_name:   blocks_fast
          description: "Blocos Ethereum minerados em tempo real. Inclui número, hash, miner, gas_used, base_fee e transaction_count."

        - catalog_name: ${var.catalog}
          schema_name:  s_apps
          table_name:   popular_contracts_ranking
          description: "Ranking de contratos mais populares por volume de transações na última hora."

        - catalog_name: ${var.catalog}
          schema_name:  s_apps
          table_name:   transactions_lambda
          description: "Visão Lambda: une dados streaming (fast lane) e batch para visão completa das transações com input decodificado."

        - catalog_name: ${var.catalog}
          schema_name:  g_network
          table_name:   network_metrics_hourly
          description: "Métricas horárias da rede: TPS médio, gas price médio, utilização de bloco e número de transações por bloco."

        - catalog_name: ${var.catalog}
          schema_name:  g_api_keys
          table_name:   etherscan_consumption
          description: "Consumo e taxa de erro das API keys Etherscan. Monitoramento de rate limits."

        - catalog_name: ${var.catalog}
          schema_name:  g_api_keys
          table_name:   web3_keys_consumption
          description: "Consumo e taxa de erro das API keys Web3/Infura. Monitoramento de rate limits."

      sample_questions:
        - "Quais contratos tiveram mais transações na última hora?"
        - "Qual foi o TPS médio da rede Ethereum nas últimas 24 horas?"
        - "Qual API key tem a maior taxa de erro atualmente?"
        - "Quantas transações foram decodificadas com sucesso vs parcialmente?"
        - "Qual foi o bloco com maior consumo de gas hoje?"
