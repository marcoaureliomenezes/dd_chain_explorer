name: Deploy Infra Cloud

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - DEV (Cloud AWS)
          - prd
      force_apply:
        description: 'Force apply / skip version tag check (PRD only)'
        required: false
        default: false
        type: boolean
      skip_databricks:
        description: 'Skip 05_databricks module (PRD only)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  AWS_REGION:      sa-east-1
  TF_VERSION:      1.7.0
  PRD_ROOT:        services/prd
  DEV_PERIPHERALS: services/dev/01_peripherals
  DEV_LAMBDA:      services/dev/02_lambda

jobs:

  # ── Branch guard ───────────────────────────────────────────────
  branch-guard:
    name: Branch guard
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::This workflow must be triggered from the 'develop' branch. Got: ${{ github.ref }}"
            exit 1
          fi

  # ══════════════════════════════════════════════════════════════
  #  DEV (Cloud AWS)
  # ══════════════════════════════════════════════════════════════

  dev-detect-changes:
    name: DEV — Detect changes
    needs: branch-guard
    if: github.event.inputs.environment == 'DEV (Cloud AWS)'
    runs-on: ubuntu-latest
    outputs:
      peripherals_changed: ${{ steps.detect.outputs.peripherals_changed }}
      lambda_changed:      ${{ steps.detect.outputs.lambda_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine changed modules
        id: detect
        run: |
          FORCE="${{ github.event.inputs.force_apply }}"
          if [ "$FORCE" = "true" ]; then
            echo "peripherals_changed=true" >> $GITHUB_OUTPUT
            echo "lambda_changed=true"      >> $GITHUB_OUTPUT
            echo "Forced — all DEV modules will be applied."
          else
            DIFF=$(git diff --name-only origin/develop...HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
            echo "Changed files: $DIFF"
            if echo "$DIFF" | grep -q "${{ env.DEV_PERIPHERALS }}/"; then
              echo "peripherals_changed=true" >> $GITHUB_OUTPUT
            else
              echo "peripherals_changed=false" >> $GITHUB_OUTPUT
            fi
            if echo "$DIFF" | grep -q "${{ env.DEV_LAMBDA }}/"; then
              echo "lambda_changed=true" >> $GITHUB_OUTPUT
            else
              echo "lambda_changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  dev-plan-peripherals:
    name: DEV — Plan 04_peripherals
    needs: dev-detect-changes
    if: needs.dev-detect-changes.outputs.peripherals_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.DEV_PERIPHERALS }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev-peripherals
          path: ${{ env.DEV_PERIPHERALS }}/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan DEV/04_peripherals" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -20 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  dev-apply-peripherals:
    name: DEV — Apply 04_peripherals
    needs: [dev-detect-changes, dev-plan-peripherals]
    if: needs.dev-detect-changes.outputs.peripherals_changed == 'true'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.DEV_PERIPHERALS }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-dev-peripherals
          path: ${{ env.DEV_PERIPHERALS }}
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  dev-apply-lambda:
    name: DEV — Plan + Apply 06_lambda
    needs: [dev-detect-changes, dev-apply-peripherals]
    if: |
      always() &&
      needs.dev-detect-changes.outputs.lambda_changed == 'true' &&
      (needs.dev-apply-peripherals.result == 'success' || needs.dev-apply-peripherals.result == 'skipped')
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.DEV_LAMBDA }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: mkdir -p .lambda_zip
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - if: always()
        run: |
          echo "### Plan DEV/06_lambda" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -20 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  # ══════════════════════════════════════════════════════════════
  #  PRD — Layer 0: version check (gate for all PRD jobs)
  # ══════════════════════════════════════════════════════════════

  prd-check-version:
    name: PRD — Check version
    needs: branch-guard
    if: github.event.inputs.environment == 'prd'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read and validate VERSION
        id: ver
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "${{ github.event.inputs.force_apply }}" = "true" ]; then
            echo "force_apply — skipping tag check."
          elif git tag --list | grep -qx "v${VERSION}-infra"; then
            echo "::error::v${VERSION}-infra already tagged. A new PR merge to develop is required to bump VERSION."
            exit 1
          fi
          echo "Version v${VERSION} — OK."
          echo "## Version Check" >> $GITHUB_STEP_SUMMARY
          echo "Deploying PRD infra **v${VERSION}**" >> $GITHUB_STEP_SUMMARY

  # ── PRD Layer 1: 02_vpc + 04_peripherals (parallel) ───────────

  prd-plan-vpc:
    name: PRD — Plan 02_vpc
    needs: prd-check-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/02_vpc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prd-02_vpc
          path: ${{ env.PRD_ROOT }}/02_vpc/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan PRD/02_vpc" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  prd-apply-vpc:
    name: PRD — Apply 02_vpc
    needs: prd-plan-vpc
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/02_vpc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prd-02_vpc
          path: ${{ env.PRD_ROOT }}/02_vpc
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  prd-plan-peripherals:
    name: PRD — Plan 04_peripherals
    needs: prd-check-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/04_peripherals
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prd-04_peripherals
          path: ${{ env.PRD_ROOT }}/04_peripherals/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan PRD/04_peripherals" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  prd-apply-peripherals:
    name: PRD — Apply 04_peripherals
    needs: prd-plan-peripherals
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/04_peripherals
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prd-04_peripherals
          path: ${{ env.PRD_ROOT }}/04_peripherals
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  # ── PRD Layer 2: 03_iam (depends on vpc + peripherals) ─────────

  prd-plan-iam:
    name: PRD — Plan 03_iam
    needs: [prd-apply-vpc, prd-apply-peripherals]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/03_iam
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prd-03_iam
          path: ${{ env.PRD_ROOT }}/03_iam/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan PRD/03_iam" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  prd-apply-iam:
    name: PRD — Apply 03_iam
    needs: prd-plan-iam
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/03_iam
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prd-03_iam
          path: ${{ env.PRD_ROOT }}/03_iam
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  # ── PRD Layer 3: 05a_databricks_account + 06_lambda + 07_ecs (parallel) ─

  prd-plan-databricks-account:
    name: PRD — Plan 05a_databricks_account
    needs: prd-apply-iam
    if: github.event.inputs.skip_databricks != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/05a_databricks_account
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - name: Import existing Databricks account resources (idempotent)
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
        run: |
          # Acquire OAuth token via M2M client credentials
          TOKEN=$(curl -sf -X POST \
            "https://accounts.cloud.databricks.com/oidc/accounts/${DATABRICKS_ACCOUNT_ID}/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${DATABRICKS_CLIENT_ID}" \
            --data-urlencode "client_secret=${DATABRICKS_CLIENT_SECRET}" \
            --data-urlencode "scope=all-apis" \
            | jq -r '.access_token' 2>/dev/null || true)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Could not acquire Databricks OAuth token — check DATABRICKS_CLIENT_ID/SECRET secrets."
            exit 1
          fi
          ACCT="https://accounts.cloud.databricks.com/api/2.0/accounts/${DATABRICKS_ACCOUNT_ID}"
          AUTH="Authorization: Bearer $TOKEN"

          tf_import() {
            local label="$1" addr="$2" id="$3"
            if terraform state show "$addr" &>/dev/null; then
              echo "  ${label}: already in state — skipping."
              return 0
            fi
            if terraform import "$addr" "$id"; then
              echo "  ${label}: imported OK."
            else
              echo "  ${label}: not found in Databricks — will be created by apply."
            fi
          }

          echo "==> Checking for pre-existing Databricks account resources to import..."

          CRED_ID=$(curl -sf -H "$AUTH" "${ACCT}/credentials" 2>/dev/null \
            | jq -r '[.[] | select(.credentials_name=="dm-chain-explorer-credentials")][0].credentials_id // empty' 2>/dev/null || true)
          [ -n "$CRED_ID" ] && tf_import "MWS credentials" "databricks_mws_credentials.dm" "${DATABRICKS_ACCOUNT_ID}/${CRED_ID}"

          STOR_ID=$(curl -sf -H "$AUTH" "${ACCT}/storage-configurations" 2>/dev/null \
            | jq -r '[.[] | select(.storage_configuration_name=="dm-chain-explorer-storage")][0].storage_configuration_id // empty' 2>/dev/null || true)
          [ -n "$STOR_ID" ] && tf_import "MWS storage config" "databricks_mws_storage_configurations.dm" "${DATABRICKS_ACCOUNT_ID}/${STOR_ID}"

          NET_ID=$(curl -sf -H "$AUTH" "${ACCT}/networks" 2>/dev/null \
            | jq -r '[.[] | select(.network_name=="dm-chain-explorer-network")][0].network_id // empty' 2>/dev/null || true)
          [ -n "$NET_ID" ] && tf_import "MWS network" "databricks_mws_networks.dm" "${DATABRICKS_ACCOUNT_ID}/${NET_ID}"

          WS_ID=$(curl -sf -H "$AUTH" "${ACCT}/workspaces" 2>/dev/null \
            | jq -r '[.[] | select(.workspace_name=="dm-chain-explorer-prd")][0].workspace_id // empty' 2>/dev/null || true)
          [ -n "$WS_ID" ] && tf_import "MWS workspace" "databricks_mws_workspaces.dm" "${DATABRICKS_ACCOUNT_ID}/${WS_ID}"

          MS_ID=$(curl -sf -H "$AUTH" "https://accounts.cloud.databricks.com/api/2.1/unity-catalog/metastores" 2>/dev/null \
            | jq -r '[.metastores[]? | select(.name=="dm-chain-explorer-metastore")][0].metastore_id // empty' 2>/dev/null || true)
          [ -n "$MS_ID" ] && tf_import "Unity Catalog metastore" "databricks_metastore.dm" "$MS_ID"

          if [ -n "${WS_ID:-}" ] && [ -n "${MS_ID:-}" ]; then
            tf_import "Metastore assignment" "databricks_metastore_assignment.dm" "${WS_ID}/${MS_ID}"
          fi

          # Import metastore data access (storage credential) if it already exists
          if [ -n "${MS_ID:-}" ]; then
            SC_NAME="dm-metastore-data-access"
            SC_EXISTS=$(curl -sf -H "$AUTH" \
              "https://accounts.cloud.databricks.com/api/2.1/unity-catalog/storage-credentials" 2>/dev/null \
              | jq -r --arg n "$SC_NAME" '[.storage_credentials[]? | select(.name==$n)][0].name // empty' 2>/dev/null || true)
            [ -n "$SC_EXISTS" ] && tf_import "Metastore data access" "databricks_metastore_data_access.default" "${MS_ID}|${SC_NAME}"
          fi

          # Import MWS permission assignment if workspace exists
          if [ -n "${WS_ID:-}" ]; then
            PA_EXISTS=$(curl -sf -H "$AUTH" \
              "${ACCT}/workspaces/${WS_ID}/permissionassignments" 2>/dev/null \
              | jq -r '[.permission_assignments[]? | select(any(.permissions[]?; . == "ADMIN"))][0].principal.principal_id // empty' 2>/dev/null || true)
            [ -n "$PA_EXISTS" ] && tf_import "MWS permission assignment" "databricks_mws_permission_assignment.admin" "${WS_ID}|${PA_EXISTS}"
          fi

          echo "==> Import check complete."
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          TF_VAR_project_version:   ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prd-05a-databricks-account
          path: ${{ env.PRD_ROOT }}/05a_databricks_account/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan PRD/05a_databricks_account" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  prd-apply-databricks-account:
    name: PRD — Apply 05a_databricks_account
    needs: prd-plan-databricks-account
    if: github.event.inputs.skip_databricks != 'true'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      workspace_url:   ${{ steps.ws_out.outputs.workspace_url }}
      workspace_token: ${{ steps.ws_out.outputs.workspace_token }}
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/05a_databricks_account
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prd-05a-databricks-account
          path: ${{ env.PRD_ROOT }}/05a_databricks_account
      - run: terraform init -input=false
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Apply 05a_databricks_account
        run: terraform apply -input=false -auto-approve tfplan 2>&1 | tee apply.txt; exit ${PIPESTATUS[0]}
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          TF_VAR_project_version:   ${{ steps.ver.outputs.version }}
      - name: Dump apply errors
        if: failure()
        run: |
          echo "### Apply Error — PRD/05a_databricks_account" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 apply.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Export workspace outputs
        id: ws_out
        run: |
          WS_JSON=$(terraform output -json)
          WS_URL=$(echo "$WS_JSON" | jq -r '.databricks_workspace_url.value')
          WS_TOKEN=$(echo "$WS_JSON" | jq -r '.databricks_token.value')
          echo "workspace_url=$WS_URL"   >> $GITHUB_OUTPUT
          echo "workspace_token=$WS_TOKEN" >> $GITHUB_OUTPUT
          echo "Workspace URL: $WS_URL"
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

  # ── PRD Layer 4: 05b_databricks_workspace (após workspace existir) ─

  prd-plan-databricks-workspace:
    name: PRD — Plan 05b_databricks_workspace
    needs: prd-apply-databricks-account
    if: github.event.inputs.skip_databricks != 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/05b_databricks_workspace
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
          TF_VAR_workspace_host:  ${{ needs.prd-apply-databricks-account.outputs.workspace_url }}
          TF_VAR_workspace_token: ${{ needs.prd-apply-databricks-account.outputs.workspace_token }}
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prd-05b-databricks-workspace
          path: ${{ env.PRD_ROOT }}/05b_databricks_workspace/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan PRD/05b_databricks_workspace" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  prd-apply-databricks-workspace:
    name: PRD — Apply 05b_databricks_workspace
    needs: [prd-plan-databricks-workspace, prd-apply-databricks-account]
    if: github.event.inputs.skip_databricks != 'true'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/05b_databricks_workspace
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prd-05b-databricks-workspace
          path: ${{ env.PRD_ROOT }}/05b_databricks_workspace
      - run: terraform init -input=false
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
          TF_VAR_workspace_host:  ${{ needs.prd-apply-databricks-account.outputs.workspace_url }}
          TF_VAR_workspace_token: ${{ needs.prd-apply-databricks-account.outputs.workspace_token }}

  prd-apply-lambda:
    name: PRD — Plan + Apply 06_lambda
    needs: prd-apply-iam
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/06_lambda
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: mkdir -p .lambda_zip
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - if: always()
        run: |
          echo "### Plan PRD/06_lambda" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  prd-plan-ecs:
    name: PRD — Plan 07_ecs
    needs: prd-apply-iam
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/07_ecs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-prd-07_ecs
          path: ${{ env.PRD_ROOT }}/07_ecs/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan PRD/07_ecs" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  prd-apply-ecs:
    name: PRD — Apply 07_ecs
    needs: prd-plan-ecs
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/07_ecs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-prd-07_ecs
          path: ${{ env.PRD_ROOT }}/07_ecs
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  # ── PRD git tag ────────────────────────────────────────────────

  prd-create-tag:
    name: PRD — Create git tag
    needs:
      - prd-check-version
      - prd-apply-ecs
      - prd-apply-lambda
      - prd-apply-databricks-account
      - prd-apply-databricks-workspace
    if: |
      always() &&
      needs.prd-check-version.result == 'success' &&
      needs.prd-apply-ecs.result == 'success' &&
      needs.prd-apply-lambda.result == 'success' &&
      (needs.prd-apply-databricks-account.result == 'success' || needs.prd-apply-databricks-account.result == 'skipped') &&
      (needs.prd-apply-databricks-workspace.result == 'success' || needs.prd-apply-databricks-workspace.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag master
        run: |
          VERSION="${{ needs.prd-check-version.outputs.version }}"
          TAG="v${VERSION}-infra"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          if git tag --list | grep -qx "$TAG"; then
            echo "Tag $TAG already exists — skipping." >> $GITHUB_STEP_SUMMARY
          else
            git tag -a "$TAG" -m "PRD infra v${VERSION}"
            git push origin "$TAG"
            echo "## Tag created: \`$TAG\` on master" >> $GITHUB_STEP_SUMMARY
          fi
