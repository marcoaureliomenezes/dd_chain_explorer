name: Deploy Cloud Infra PRD

on:
  workflow_dispatch:
    inputs:
      force_apply:
        description: 'Skip version tag check (redeploy same version after destroy)'
        required: false
        default: false
        type: boolean
      skip_databricks:
        description: 'Skip 7_databricks module'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  AWS_REGION: sa-east-1
  TF_VERSION: 1.7.0
  TF_ROOT:    services/prd
  HML_TF_DIR: services/hml/1_aws_core

# Reusable step definitions via composite would be ideal but GHA doesn't support
# anchors, so we repeat the setup steps per job.

jobs:

  # ── Branch + version guard ─────────────────────────────────────
  check-version:
    name: Check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Enforce develop branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::Must be triggered from develop. Got: ${{ github.ref }}"
            exit 1
          fi
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate VERSION
        id: ver
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "${{ github.event.inputs.force_apply }}" = "true" ]; then
            echo "force_apply — skipping tag check."
          elif git tag --list | grep -qx "v${VERSION}-infra"; then
            echo "::error::v${VERSION}-infra already tagged. Bump VERSION."
            exit 1
          fi
          echo "Version v${VERSION} — OK."

  # ── HML persistent infra ───────────────────────────────────────
  plan-hml:
    name: Plan — HML
    needs: check-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.HML_TF_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-hml
          path: ${{ env.HML_TF_DIR }}/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan HML" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -15 plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  apply-hml:
    name: Apply — HML
    needs: plan-hml
    runs-on: ubuntu-latest
    environment: hml
    defaults:
      run:
        working-directory: ${{ env.HML_TF_DIR }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-hml
          path: ${{ env.HML_TF_DIR }}
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan

  # ── Layer 0: VPC + S3 (no external deps, run in parallel) ──────
  plan-vpc:
    name: Plan — 1_vpc
    needs: check-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/1_vpc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-1_vpc
          path: ${{ env.TF_ROOT }}/1_vpc/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan 1_vpc" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  apply-vpc:
    name: Apply — 1_vpc
    needs: plan-vpc
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/1_vpc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-1_vpc
          path: ${{ env.TF_ROOT }}/1_vpc
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan

  plan-s3:
    name: Plan — 4_s3
    needs: check-version
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/4_s3
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-4_s3
          path: ${{ env.TF_ROOT }}/4_s3/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan 4_s3" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  apply-s3:
    name: Apply — 4_s3
    needs: plan-s3
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/4_s3
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-4_s3
          path: ${{ env.TF_ROOT }}/4_s3
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan

  # ── Layer 1: IAM (depends on vpc + s3) ────────────────────────
  plan-iam:
    name: Plan — 2_iam
    needs: [apply-vpc, apply-s3]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/2_iam
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-2_iam
          path: ${{ env.TF_ROOT }}/2_iam/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan 2_iam" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  apply-iam:
    name: Apply — 2_iam
    needs: plan-iam
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/2_iam
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-2_iam
          path: ${{ env.TF_ROOT }}/2_iam
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan

  # ── Layer 2: Kinesis/SQS + DynamoDB (parallel, after iam) ──────
  plan-kinesis-sqs:
    name: Plan — 3_kinesis_sqs
    needs: apply-iam
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/3_kinesis_sqs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-3_kinesis_sqs
          path: ${{ env.TF_ROOT }}/3_kinesis_sqs/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan 3_kinesis_sqs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  apply-kinesis-sqs:
    name: Apply — 3_kinesis_sqs
    needs: plan-kinesis-sqs
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/3_kinesis_sqs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-3_kinesis_sqs
          path: ${{ env.TF_ROOT }}/3_kinesis_sqs
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan

  plan-dynamodb:
    name: Plan — 9_dynamodb
    needs: apply-iam
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/9_dynamodb
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-9_dynamodb
          path: ${{ env.TF_ROOT }}/9_dynamodb/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan 9_dynamodb" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  apply-dynamodb:
    name: Apply — 9_dynamodb
    needs: plan-dynamodb
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/9_dynamodb
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-9_dynamodb
          path: ${{ env.TF_ROOT }}/9_dynamodb
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan

  # ── Layer 3: Databricks (depends on vpc + iam, optional) ───────
  plan-databricks:
    name: Plan — 7_databricks
    needs: apply-iam
    if: ${{ github.event.inputs.skip_databricks != 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/7_databricks
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-7_databricks
          path: ${{ env.TF_ROOT }}/7_databricks/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan 7_databricks" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  apply-databricks:
    name: Apply — 7_databricks
    needs: plan-databricks
    if: ${{ github.event.inputs.skip_databricks != 'true' }}
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/7_databricks
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-7_databricks
          path: ${{ env.TF_ROOT }}/7_databricks
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

  # ── Layer 4: ECS (depends on vpc + iam + kinesis_sqs + dynamodb) 
  plan-ecs:
    name: Plan — 6_ecs
    needs: [apply-kinesis-sqs, apply-dynamodb]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/6_ecs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-6_ecs
          path: ${{ env.TF_ROOT }}/6_ecs/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan 6_ecs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  apply-ecs:
    name: Apply — 6_ecs
    needs: plan-ecs
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/6_ecs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-6_ecs
          path: ${{ env.TF_ROOT }}/6_ecs
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan

  # ── Layer 5: Lambda (depends on s3 + kinesis_sqs + dynamodb) ───
  plan-lambda:
    name: Plan — 10_lambda
    needs: [apply-kinesis-sqs, apply-dynamodb, apply-s3]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/10_lambda
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-10_lambda
          path: ${{ env.TF_ROOT }}/10_lambda/tfplan
          retention-days: 1
      - if: always()
        run: |
          echo "### Plan 10_lambda" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY

  apply-lambda:
    name: Apply — 10_lambda
    needs: plan-lambda
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_ROOT }}/10_lambda
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - uses: actions/download-artifact@v4
        with:
          name: tfplan-10_lambda
          path: ${{ env.TF_ROOT }}/10_lambda
      - run: terraform init -input=false
      - run: terraform apply -input=false -auto-approve tfplan

  # ── Create git tag on master after all PRD applies ─────────────
  create-tag:
    name: Create git tag
    needs: [check-version, apply-ecs, apply-lambda]
    if: always() && needs.check-version.result == 'success' && needs.apply-ecs.result == 'success' && needs.apply-lambda.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag master
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          git tag -a "v${VERSION}-infra" -m "PRD infra v${VERSION}"
          git push origin "v${VERSION}-infra"
          echo "## Tag created: \`v${VERSION}-infra\` on master" >> $GITHUB_STEP_SUMMARY
