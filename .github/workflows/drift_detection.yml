name: Drift Detection

# ── IS-12 — Weekly drift scan for persistent environments ────────
# Runs `terraform plan` (no apply) on DEV and PRD modules every Monday.
# Any pending change = drift detected → job fails with ::error:: annotation.
#
# Databricks modules (05a/05b) excluded — they need provider auth and
# account import that can't be done safely in a scheduled context.
#
# Can also be triggered manually via workflow_dispatch for on-demand checks.

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch: {}

env:
  AWS_REGION: sa-east-1
  TF_VERSION: 1.7.0

# ──────────────────────────────────────────────────────────────────────────────
jobs:

  # ── DEV ──────────────────────────────────────────────────────────────────

  drift-dev-peripherals:
    name: Drift — DEV/Peripherals
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dev/01_peripherals
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - name: Terraform Plan (Drift Check)
        id: plan
        run: bash "$GITHUB_WORKSPACE/scripts/ci/tf_plan.sh"
        env:
          MODULE_NAME: DEV/Peripherals
          TAIL_LINES: "30"
          TF_VAR_project_version: "drift-check"
      - name: Alert on drift
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: |
          echo "::error::DRIFT DETECTED in DEV/Peripherals — unexpected pending changes found."
          exit 1

  drift-dev-lambda:
    name: Drift — DEV/Lambda
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dev/02_lambda
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - name: Terraform Plan (Drift Check)
        id: plan
        run: bash "$GITHUB_WORKSPACE/scripts/ci/tf_plan.sh"
        env:
          MODULE_NAME: DEV/Lambda
          TAIL_LINES: "30"
          TF_VAR_project_version: "drift-check"
      - name: Alert on drift
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: |
          echo "::error::DRIFT DETECTED in DEV/Lambda — unexpected pending changes found."
          exit 1

  # ── PRD ──────────────────────────────────────────────────────────────────

  drift-prd-vpc:
    name: Drift — PRD/VPC
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/prd/02_vpc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - name: Terraform Plan (Drift Check)
