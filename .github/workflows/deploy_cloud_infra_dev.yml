name: Deploy Cloud Infra DEV

on:
  workflow_dispatch:
    inputs:
      force_apply:
        description: 'Force apply even if no terraform changes detected'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  AWS_REGION:   sa-east-1
  TF_VERSION:   1.7.0
  DEV_TF_DIR:   services/dev/terraform/1_aws_core

jobs:
  # ----------------------------------------------------------------
  # Branch guard — only allow dispatch from develop
  # ----------------------------------------------------------------
  branch-guard:
    name: Branch guard
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::This workflow must be triggered from the 'develop' branch. Got: ${{ github.ref }}"
            exit 1
          fi
          echo "Branch check passed: ${{ github.ref }}"

  # ----------------------------------------------------------------
  # Detect if DEV terraform has changes
  # ----------------------------------------------------------------
  detect-changes:
    name: Detect changes
    needs: branch-guard
    runs-on: ubuntu-latest
    outputs:
      dev_changed: ${{ steps.detect.outputs.dev_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine if DEV terraform changed
        id: detect
        run: |
          if [ "${{ github.event.inputs.force_apply }}" = "true" ]; then
            echo "dev_changed=true" >> $GITHUB_OUTPUT
            echo "DEV: forced via workflow input"
          elif git diff --name-only origin/develop...HEAD | grep -q "${{ env.DEV_TF_DIR }}/"; then
            echo "dev_changed=true" >> $GITHUB_OUTPUT
            echo "DEV: changes detected in ${{ env.DEV_TF_DIR }}"
          else
            echo "dev_changed=false" >> $GITHUB_OUTPUT
            echo "DEV: no changes detected"
          fi

  # ----------------------------------------------------------------
  # DEV — Terraform plan
  # Manages: S3 bucket, DynamoDB table, Kinesis/SQS, Lambda, CloudWatch
  # State: S3 remote (bucket dm-chain-explorer-terraform-state, key dev/)
  # ----------------------------------------------------------------
  dev-plan:
    name: Plan — DEV
    needs: detect-changes
    if: needs.detect-changes.outputs.dev_changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.DEV_TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color -input=false -out=tfplan 2>&1 | tee plan.txt

      - name: Upload DEV plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.DEV_TF_DIR }}/tfplan
          retention-days: 1

      - name: Post DEV plan summary
        if: always()
        run: |
          echo "### Terraform Plan — \`DEV\`" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY
          tail -20 plan.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ----------------------------------------------------------------
  # DEV — Terraform apply (auto-approve, environment: dev)
  # ----------------------------------------------------------------
  dev-apply:
    name: Apply — DEV
    needs: [detect-changes, dev-plan]
    if: needs.detect-changes.outputs.dev_changed == 'true'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.DEV_TF_DIR }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download DEV plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-dev
          path: ${{ env.DEV_TF_DIR }}

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Show DEV outputs
        run: |
          echo "### DEV Terraform Outputs" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          terraform output >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ----------------------------------------------------------------
  # Summary
  # ----------------------------------------------------------------
  summary:
    name: Summary
    needs: [detect-changes, dev-apply]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Post deploy summary
        run: |
          echo "## Deploy Cloud Infra DEV — Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Changed | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| DEV | ${{ needs.detect-changes.outputs.dev_changed }} | ${{ needs.dev-apply.result }} |" >> $GITHUB_STEP_SUMMARY
