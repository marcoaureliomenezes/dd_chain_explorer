resources:
  pipelines:
    pipeline_ethereum:
      name: "dm-ethereum"
      description: "DLT pipeline para processamento de dados Ethereum — Bronze + Silver + Gold."

      catalog: ${var.catalog}
      target: b_ethereum

      libraries:
        - notebook:
            path: ../../src/streaming/ethereum_pipeline.py

      serverless: true

      configuration:
        # S3 bucket for ingestion (raw data, DLT external tables, checkpoints)
        ingestion.s3.bucket: ${var.ingestion_s3_bucket}
        # Catalog name (para spark.table() referências a tabelas externas ao DLT)
        catalog: ${var.catalog}
        # S3 export path (para MVs que exportam dados para consumo externo)
        s3.export.path: "s3://${var.ingestion_s3_bucket}/exports/popular_contracts"

      continuous: ${var.dlt_continuous}
      channel: CURRENT

      schedule:
        # DEV/HML: PAUSED — trigger via dm-trigger-all-dlts or bundle run
        # PROD: override pause_status: UNPAUSED in databricks.yml target prod
        quartz_cron_expression: "0 0/3 * * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED

      tags:
        project: dd-chain-explorer
        layer: streaming
        component: ethereum
