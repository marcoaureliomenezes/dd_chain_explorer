name: Deploy Lib Utils

on:
  workflow_dispatch:

env:
  LIB_PATH: utils

jobs:
  # ----------------------------------------------------------------
  # Gate — unit tests
  # ----------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: utils/pyproject.toml

      - name: Install dm-chain-utils (dev extras)
        run: pip install --upgrade pip && pip install "${{ env.LIB_PATH }}/[dev]"

      - name: Run unit tests
        run: pytest ${{ env.LIB_PATH }}/tests/unit/ -v --tb=short

  # ----------------------------------------------------------------
  # Build sdist + wheel
  # ----------------------------------------------------------------
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install --upgrade pip build

      - name: Build distribution
        run: python -m build "${{ env.LIB_PATH }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ${{ env.LIB_PATH }}/dist/

  # ----------------------------------------------------------------
  # Version check — ensure local version is newer than PyPI
  # ----------------------------------------------------------------
  version-check:
    name: Check version is newer than PyPI
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.local.outputs.version }}
      name: ${{ steps.local.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract local version
        id: local
        run: |
          VERSION=$(python -c "
          import re, pathlib
          text = pathlib.Path('${{ env.LIB_PATH }}/pyproject.toml').read_text()
          print(re.search(r'version\s*=\s*\"([^\"]+)\"', text).group(1))
          ")
          NAME=$(python -c "
          import re, pathlib
          text = pathlib.Path('${{ env.LIB_PATH }}/pyproject.toml').read_text()
          print(re.search(r'name\s*=\s*\"([^\"]+)\"', text).group(1))
          ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
          echo "Local: $NAME==$VERSION"

      - name: Compare with PyPI
        run: |
          PYPI_VERSION=$(curl -sf "https://pypi.org/pypi/${{ steps.local.outputs.name }}/json" \
            | jq -r '.info.version' 2>/dev/null) || PYPI_VERSION="0.0.0"
          echo "PyPI version: $PYPI_VERSION"
          echo "Local version: ${{ steps.local.outputs.version }}"
          python3 -c "
          from packaging.version import Version
          local = Version('${{ steps.local.outputs.version }}')
          pypi  = Version('${PYPI_VERSION}')
          if local <= pypi:
              raise SystemExit(f'Local {local} is not newer than PyPI {pypi}. Bump the version in pyproject.toml.')
          print(f'OK: {local} > {pypi}')
          "

  # ----------------------------------------------------------------
  # Publish to PyPI (trusted publisher — OIDC)
  # ----------------------------------------------------------------
  publish:
    name: Publish to PyPI
    needs: version-check
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # ----------------------------------------------------------------
  # GitHub Release with artifacts
  # ----------------------------------------------------------------
  github-release:
    name: Create GitHub Release
    needs: [version-check, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ needs.version-check.outputs.version }}"
          gh release create "$TAG" dist/* \
            --title "${{ needs.version-check.outputs.name }} $TAG" \
            --generate-notes
