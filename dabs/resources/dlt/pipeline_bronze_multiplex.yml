resources:
  pipelines:
    pipeline_bronze_multiplex:
      name: "[${bundle.target}] dm-bronze-multiplex"
      description: >
        DLT pipeline que consome dados e grava na camada Bronze
        (b_fast.kafka_topics_multiplexed).
        - PROD: lê diretamente do Kafka MSK (streaming contínuo).
        - DEV:  lê do S3 (Parquet) previamente ingestado pelo job local
                spark-app-kafka-s3.

      catalog: ${var.catalog}
      target: b_fast

      libraries:
        - notebook:
            path: ../../src/streaming/2_pipeline_bronze_multiplex.py

      configuration:
        # Fonte de dados: "kafka" (prod) ou "s3" (dev)
        source.type: ${var.source_type}
        # Kafka config (usado quando source.type = kafka)
        kafka.bootstrap.servers: ${var.kafka_bootstrap_servers}
        kafka.msk.iam.auth: "true"
        # S3 config (usado quando source.type = s3)
        s3.ingestion.path: "s3://${var.dev_ingestion_s3_bucket}/bronze/kafka_multiplex"

      serverless: true

      development: ${var.dlt_development}
      continuous: ${var.dlt_continuous}
      channel: CURRENT
