resources:
  pipelines:
    pipeline_ethereum:
      name: "dm-ethereum"

      catalog: ${var.catalog}
      target: b_ethereum   # schema padrão para tabelas sem prefixo (bronze)
                           # tabelas silver usam name="s_apps.*" / "s_logs.*"

      libraries:
        - notebook:
            path: ../../src/streaming/4_pipeline_ethereum.py

      configuration:
        # S3 bucket for ingestion (raw data, DLT external tables, checkpoints)
        ingestion.s3.bucket: ${var.dev_ingestion_s3_bucket}
        # Catalog name (para spark.table() referências a tabelas externas ao DLT)
        catalog: ${var.catalog}
        # S3 export path (para MVs que exportam dados para consumo externo)
        s3.export.path: "s3://${var.dev_ingestion_s3_bucket}/exports/popular_contracts"

      serverless: true

      development: ${var.dlt_development}
      continuous: ${var.dlt_continuous}
      channel: CURRENT
