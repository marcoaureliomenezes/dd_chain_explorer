name: Deploy Infra Cloud

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - DEV (Cloud AWS)
          - hml
          - prd
      force_apply:
        description: 'Force apply / skip version tag check (PRD only)'
        required: false
        default: false
        type: boolean
      skip_databricks:
        description: 'Skip Databricks modules (PRD only)'
        required: false
        default: false
        type: boolean
      fast_mode:
        description: 'PRD only: speed up 05b by skipping Databricks cluster creation'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  AWS_REGION:      sa-east-1
  TF_VERSION:      1.7.0
  DEV_PERIPHERALS: services/dev/01_peripherals
  DEV_LAMBDA:      services/dev/02_lambda

jobs:

  # ── Branch guard ───────────────────────────────────────────────
  branch-guard:
    name: Branch guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce develop branch
        run: bash "$GITHUB_WORKSPACE/scripts/ci/branch_guard.sh"

  # ══════════════════════════════════════════════════════════════
  #  DEV (Cloud AWS)
  # ══════════════════════════════════════════════════════════════

  dev-detect-changes:
    name: DEV — Detect changes
    needs: branch-guard
    if: github.event.inputs.environment == 'DEV (Cloud AWS)'
    runs-on: ubuntu-latest
    outputs:
      peripherals_changed: ${{ steps.detect.outputs.peripherals_changed }}
      lambda_changed:      ${{ steps.detect.outputs.lambda_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine changed modules
        id: detect
        run: bash "$GITHUB_WORKSPACE/scripts/ci/detect_changes.sh"
        env:
          FORCE: ${{ github.event.inputs.force_apply }}

  dev-deploy-peripherals:
    name: DEV — Deploy Peripherals AWS
    concurrency:
      group: tf-dev-peripherals
      cancel-in-progress: false
    needs: dev-detect-changes
    if: needs.dev-detect-changes.outputs.peripherals_changed == 'true'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.DEV_PERIPHERALS }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Terraform Plan
        id: plan
        run: bash "$GITHUB_WORKSPACE/scripts/ci/tf_plan.sh"
        env:
          MODULE_NAME: DEV/Peripherals
          TAIL_LINES: "20"
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  dev-deploy-lambda:
    name: DEV — Deploy Lambda AWS
    concurrency:
      group: tf-dev-lambda
      cancel-in-progress: false
    needs: [dev-detect-changes, dev-deploy-peripherals]
    if: |
      always() &&
      needs.dev-detect-changes.outputs.lambda_changed == 'true' &&
      (needs.dev-deploy-peripherals.result == 'success' || needs.dev-deploy-peripherals.result == 'skipped')
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.DEV_LAMBDA }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: mkdir -p .lambda_zip
      - run: terraform init -input=false
      - run: terraform validate
      - name: Terraform Plan
        id: plan
        run: bash "$GITHUB_WORKSPACE/scripts/ci/tf_plan.sh"
        env:
          MODULE_NAME: DEV/Lambda
          TAIL_LINES: "20"
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  # ══════════════════════════════════════════════════════════════
  #  PRD — Layer 0: version check (gate for all PRD jobs)
  # ══════════════════════════════════════════════════════════════

  prd-check-version:
    name: PRD — Check version
    needs: branch-guard
    if: github.event.inputs.environment == 'prd'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read and validate VERSION
        id: ver
        run: bash "$GITHUB_WORKSPACE/scripts/ci/check_prd_version.sh"
        env:
          FORCE_APPLY: ${{ github.event.inputs.force_apply }}

  # ── PRD — single deploy job ────────────────────────────────────

  prd-deploy:
    name: PRD — Deploy all modules
    concurrency:
      group: tf-prd-deploy
      cancel-in-progress: false
    needs: prd-check-version
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Deploy PRD
        run: bash "$GITHUB_WORKSPACE/scripts/ci/deploy_env.sh" prd
        env:
          DATABRICKS_ACCOUNT_ID:           ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:            ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET:        ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          TF_VAR_databricks_client_id:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          TF_VAR_project_version:          ${{ needs.prd-check-version.outputs.version }}
          SKIP_DATABRICKS:                 ${{ github.event.inputs.skip_databricks }}
          FAST_MODE:                       ${{ github.event.inputs.fast_mode }}

  # ── PRD git tag ────────────────────────────────────────────────

  prd-create-tag:
    name: PRD — Create git tag
    needs:
      - prd-check-version
      - prd-deploy
    if: needs.prd-check-version.result == 'success' && needs.prd-deploy.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag master
        run: |
          VERSION="${{ needs.prd-check-version.outputs.version }}"
          TAG="v${VERSION}-infra"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          if git tag --list | grep -qx "$TAG"; then
            echo "Tag $TAG already exists — skipping." >> $GITHUB_STEP_SUMMARY
          else
            git tag -a "$TAG" -m "PRD infra v${VERSION}"
            git push origin "$TAG"
            echo "## Tag created: \`$TAG\` on master" >> $GITHUB_STEP_SUMMARY
          fi

  # ══════════════════════════════════════════════════════════════
  #  HML — single job (all modules sequentially via wrapper script)
  # ══════════════════════════════════════════════════════════════

  hml-deploy:
    name: HML — Deploy all modules
    concurrency:
      group: tf-hml-deploy
      cancel-in-progress: false
    needs: branch-guard
    if: github.event.inputs.environment == 'hml'
    runs-on: ubuntu-latest
    environment: hml
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Deploy HML
        run: bash "$GITHUB_WORKSPACE/scripts/ci/deploy_env.sh" hml
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
