resources:
  jobs:
    dm-trigger-dlt-app-logs:
      name: "dm-trigger-dlt-app-logs"
      description: "CI trigger job — runs the dm-app-logs DLT pipeline once and waits for completion."
      max_concurrent_runs: 1
      tasks:
        - task_key: run_dlt_app_logs
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_app_logs.id}
            full_refresh: false
      tags:
        layer:   streaming
        project: dd-chain-explorer
        trigger: ci
