x-conf-dev-onchain-stream-txs: &conf_dev_onchain_stream_txs
  restart: on-failure
  env_file:
    - ./conf/local.kafka.conf   # Kafka local (local_services.yml) — substitui MSK em DEV
    - ./conf/dev.redis.conf     # Redis local (local_services.yml) — substitui ElastiCache em DEV
  networks:
    - vpc_dm
  build: ../../../docker/onchain-stream-txs
  volumes:
    - ../../../docker/onchain-stream-txs/src:/app
    - ~/.aws:/root/.aws:ro   # credenciais reais do host (SSM, Glue, etc.)

x-conf-dev-spark-stream-txs: &conf_dev_spark_stream_txs
  restart: on-failure
  image: local/spark:3.5
  env_file:
    - ./conf/local.kafka.conf
    - ./conf/dev.redis.conf
  networks:
    - vpc_dm
  volumes:
    - ../../../docker/spark-stream-txs/src:/app
    - ~/.aws:/root/.aws:ro

services:

  ################################################################################################
  ############################    PYTHON APPLICATIONS    #########################################


  python-job-mined-blocks-watcher:
    <<: *conf_dev_onchain_stream_txs
    container_name: python-job-mined-blocks-watcher
    entrypoint: "python -u /app/1_mined_blocks_watcher.py /app/configs/producers.ini"
    environment:

      SSM_SECRET_NAME: '/web3-api-keys/alchemy/api-key-1'
      TOPIC_LOGS: mainnet.0.application.logs
      TOPIC_MINED_BLOCKS_EVENTS: mainnet.1.mined_blocks.events
      CLOCK_FREQUENCY: 1


  python-job-orphan-blocks-watcher:
    <<: *conf_dev_onchain_stream_txs
    container_name: python-job-orphan-blocks-watcher
    entrypoint: "python -u /app/2_orphan_blocks_watcher.py /app/configs/producers.ini /app/configs/consumers.ini"
    environment:
      SSM_SECRET_NAME: '/web3-api-keys/alchemy/api-key-2'
      TOPIC_LOGS: mainnet.0.application.logs
      TOPIC_MINED_BLOCKS_EVENTS: mainnet.1.mined_blocks.events
      CONSUMER_GROUP_ID: cg_orphan_block_events


  python-job-block-data-crawler:
    <<: *conf_dev_onchain_stream_txs
    container_name: python-job-block-data-crawler
    entrypoint: "python -u /app/3_block_data_crawler.py /app/configs/producers.ini /app/configs/consumers.ini"
    environment:
      SSM_SECRET_NAME: '/web3-api-keys/alchemy/api-key-2'
      TOPIC_LOGS: mainnet.0.application.logs
      TOPIC_MINED_BLOCKS_EVENTS: mainnet.1.mined_blocks.events
      CONSUMER_GROUP: cg_block_data_crawler
      TOPIC_MINED_BLOCKS: mainnet.2.blocks.data
      TOPIC_TXS_HASH_IDS: 'mainnet.3.block.txs.hash_id'
      TOPIC_TXS_HASH_IDS_PARTITIONS: 8
      TXS_PER_BLOCK: 50


  python-job-transactions_crawler:
    <<: *conf_dev_onchain_stream_txs
    #container_name: python-job-transactions_crawler
    entrypoint: "python -u 4_mined_txs_crawler.py configs/producers.ini configs/consumers.ini"
    environment:

      SSM_SECRET_NAMES: '/web3-api-keys/infura/api-key-1-17'
      TOPIC_LOGS: mainnet.0.application.logs
      TOPIC_TXS_HASH_IDS: mainnet.3.block.txs.hash_id
      TOPIC_TXS_DATA: mainnet.4.transactions.data
      CONSUMER_GROUP: 'cg_mined_raw_txs'
    deploy:
      replicas: 6


  python-job-txs-input-decoder:
    <<: *conf_dev_onchain_stream_txs
    container_name: python-job-txs-input-decoder
    entrypoint: "python -u /app/5_txs_input_decoder.py /app/configs/producers.ini /app/configs/consumers.ini"
    environment:
      NETWORK: mainnet
      TOPIC_LOGS: mainnet.0.application.logs
      TOPIC_TXS_DATA: mainnet.4.transactions.data
      TOPIC_TXS_DECODED: mainnet.5.transactions.input_decoded
      CONSUMER_GROUP: cg_txs_input_decoder
      SSM_ETHERSCAN_PATH: /etherscan-api-keys  # all 6 keys fetched via get_parameters_by_path
      UNVERIFIED_TTL: 86400                    # 24h negative-cache TTL for unverified contracts


  python-job-redis-collector:
    <<: *conf_dev_onchain_stream_txs
    container_name: python-job-redis-collector
    entrypoint: "python -u n_semaphore_collect.py"
    environment:
      FREQUENCY: 0.5


  ##############################################################################
  ############################    SPARK APPLICATIONS    ########################

  spark-app-apk-consumption:
    <<: *conf_dev_spark_stream_txs
    image: local/spark-stream-txs:latest  # must include Kafka JARs — use the pre-built image, not the base
    container_name: spark-app-apk-consumption
    user: root
    entrypoint: >-
      bash -c "sh /app/entrypoint.sh /app/pyspark/1_api_key_monitor.py"
    environment:
      SPARK_MASTER: "local[*]"   # local[*]: driver+executor no mesmo processo, sem spark-worker-1
      TOPIC_LOGS: mainnet.0.application.logs
      CONSUMER_GROUP: cg_logs_processor
      STARTING_OFFSETS: earliest
      MAX_OFFSETS_PER_TRIGGER: 30000
      TRIGGER_TIME: "2 seconds"
      CHECKPOINT_PATH: /tmp/checkpoints/api_key_monitor
      EXEC_MEMORY: 1g
      TOTAL_EXEC_CORES: 1

  # --------------------------------------------------------------------------
  # Spark job: Kafka → S3 multiplex ingestion
  # Lê 5 tópicos Kafka e escreve no S3 como Parquet particionado por topic_name.
  # Os dados ficam prontos para leitura pelo Databricks Free Edition (DLT).
  #
  # Pré-requisitos:
  #   1. Bucket S3 criado: make dev_tf_apply
  #   2. Credenciais em services/conf/dev.s3.conf (ver dev.s3.conf.example)
  #   3. Kafka + dados fluindo: make deploy_dev_infra && make deploy_dev_stream
  #
  # Subir isoladamente: docker compose -f services/dev/compose/app_services.yml up -d spark-app-kafka-s3
  # --------------------------------------------------------------------------
  spark-app-kafka-s3:
    <<: *conf_dev_spark_stream_txs
    image: local/spark-stream-txs:latest
    container_name: spark-app-kafka-s3
    user: root
    entrypoint: >-
      bash -c "sh /app/entrypoint.sh /app/pyspark/2_kafka_to_s3_multiplex.py"
    environment:
      SPARK_MASTER: "local[*]"
      S3_BUCKET: dm-chain-explorer-dev-ingestion
      AWS_REGION: sa-east-1
      CONSUMER_GROUP: cg_kafka_s3_multiplex
      STARTING_OFFSETS: earliest
      MAX_OFFSETS_PER_TRIGGER: 50000
      TRIGGER_TIME: "60 seconds"
      CHECKPOINT_PATH: /tmp/checkpoints/kafka_s3_multiplex
      EXEC_MEMORY: 1g
      TOTAL_EXEC_CORES: 1


networks:
  vpc_dm:
    external: true