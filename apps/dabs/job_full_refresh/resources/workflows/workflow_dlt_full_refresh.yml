resources:
  jobs:
    workflow_dlt_full_refresh:
      name: "dm-dlt-full-refresh"
      description: "Full refresh of all DLT pipelines and export gold data. Reprocesses all historical data."

      environments:
        - environment_key: serverless
          spec:
            client: "2"
            dependencies:
              - "${workspace.file_path}/dm_export_gold-0.1.0-py3-none-any.whl"

      tasks:
        - task_key: full_refresh_ethereum
          pipeline_task:
            pipeline_id: ${var.pipeline_ethereum_id}
            full_refresh: true

        - task_key: full_refresh_app_logs
          depends_on:
            - task_key: full_refresh_ethereum
          pipeline_task:
            pipeline_id: ${var.pipeline_app_logs_id}
            full_refresh: true

        - task_key: export_gold_to_s3
          depends_on:
            - task_key: full_refresh_app_logs
          environment_key: serverless
          python_wheel_task:
            package_name: dm_export_gold
            entry_point: dm-export-gold-export-gold
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--export-s3-path"
              - "s3://${var.ingestion_s3_bucket}/exports"

      tags:
        layer: streaming
        project: dd-chain-explorer
        trigger: manual
