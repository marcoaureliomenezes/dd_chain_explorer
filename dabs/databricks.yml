bundle:
  name: dd-chain-explorer

include:
  - resources/dlt/*.yml
  - resources/workflows/*.yml
  - resources/dashboards/*.yml
  - resources/alerts/*.yml
  - resources/genie/*.yml

variables:
  dev_workspace_host:
    description: "Databricks workspace URL for DEV (Free Edition)"
    default: "https://dbc-409f1007-5779.cloud.databricks.com"

  prod_workspace_host:
    description: "Databricks workspace URL for PROD (AWS workspace)"
    default: ""

  catalog:
    description: "Unity Catalog name"
    default: "dd_chain_explorer"

  raw_s3_bucket:
    description: "S3 bucket for raw ingestion data"
    default: "dm-chain-explorer-raw-data"

  lakehouse_s3_bucket:
    description: "S3 bucket for lakehouse (Bronze/Silver/Gold)"
    default: "dm-chain-explorer-lakehouse"

  dev_ingestion_s3_bucket:
    description: "S3 bucket for DEV ingestion (Kafka → Parquet → Databricks Free Edition)"
    default: "dm-chain-explorer-dev-ingestion"

  kafka_bootstrap_servers:
    description: "Kafka MSK bootstrap brokers (IAM auth)"

  dynamodb_table:
    description: "DynamoDB single-table (PK/SK) for all application state"
    default: "dm-chain-explorer"

  source_type:
    description: "DLT bronze source: 'kafka' (prod) or 's3' (dev)"
    default: "kafka"

  dlt_num_workers:
    description: "Number of DLT workers (0 = single-node for DEV)"
    default: 1

  dlt_development:
    description: "DLT development mode flag (true for dev, false for prod)"
    default: false

  dlt_continuous:
    description: "DLT continuous mode flag (true for prod, false for dev)"
    default: false

  warehouse_id:
    description: "SQL Warehouse ID for Lakeview dashboards (run: databricks warehouses list --output json)"
    default: ""

targets:
  # ----------------------------------------------------------------
  # DEV: Databricks Free Edition
  # Use `databricks bundle deploy --target dev` to deploy
  # ----------------------------------------------------------------
  dev:
    presets:
      name_prefix: "[dev dd_chain_explorer] "
    workspace:
      host: "https://dbc-409f1007-5779.cloud.databricks.com"
      root_path: "~/.bundle/${bundle.name}/dev"
    variables:
      catalog: "dev"
      kafka_bootstrap_servers: "localhost:9092"  # local Kafka in docker-compose
      dev_ingestion_s3_bucket: "dm-chain-explorer-dev-ingestion"
      dynamodb_table: "dm-chain-explorer"
      source_type: "s3"
      dlt_num_workers: 0
      dlt_development: true
      dlt_continuous: false

  # ----------------------------------------------------------------
  # PROD: Databricks on AWS (created via terraform/7_databricks)
  # Deploy is triggered by CI/CD pipeline on merge to main
  # ----------------------------------------------------------------
  prod:
    mode: production
    workspace:
      host: ${var.prod_workspace_host}
      root_path: "/Workspace/.bundle/${bundle.name}/prod"
    variables:
      catalog: "dd_chain_explorer"
      source_type: "kafka"
      dlt_num_workers: 1
      dlt_development: false
      dlt_continuous: true
