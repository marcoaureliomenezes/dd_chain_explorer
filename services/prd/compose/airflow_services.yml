###############################################################################
# services/prd/compose/airflow_services.yml
#
# Apache Airflow — ambiente PROD (LocalExecutor, componentes mínimos).
#
# Função:
#   Orquestrar Jobs Batch de captura on-chain (ingestão S3) e disparar
#   Databricks Workflows em PROD.
#
# Executor: LocalExecutor — tasks rodam no processo do scheduler.
#
# Diferenças em relação a services/dev:
#   - DATABRICKS_CONFIG_PROFILE: prd  (usa perfil [prd] em ~/.databrickscfg)
#   - Rede independente (airflow_prd_net) — sem vpc_dm local
#   - Porta 8091 para evitar conflito se DEV também rodando na mesma máquina
#
# Credenciais (nunca hardcoded — montagem de volume read-only):
#   ~/.aws              → AWS (S3, SSM, MSK, Fargate)
#   ~/.databrickscfg    → Databricks PRD (perfil [prd])
#
# Pré-requisitos:
#   ~/.aws/credentials  ~/.aws/config  ~/.databrickscfg
#
# Subir:
#   docker compose -f services/prd/compose/airflow_services.yml up airflow-init
#   docker compose -f services/prd/compose/airflow_services.yml up -d
#
# Parar:
#   docker compose -f services/prd/compose/airflow_services.yml down
#
# Acesso: http://localhost:8091  (admin / <defina na primeira inicialização>)
###############################################################################

###############################################################################
# Âncora comum a todos os serviços Airflow PRD
###############################################################################
x-airflow-common: &airflow-common
  build:
    context: ../../../docker/customized/airflow
  restart: on-failure
  user: root
  networks:
    - airflow_prd_net
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres-prd/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'false'   # não expor config em PROD
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    AWS_DEFAULT_REGION: sa-east-1
    DATABRICKS_CONFIG_PROFILE: prd
  volumes:
    - ../../../mnt/airflow/dags:/opt/airflow/dags
    - ../../../mnt/airflow/airflow.cfg:/opt/airflow/airflow.cfg:ro
    - airflow_prd_logs:/opt/airflow/logs
    - airflow_prd_plugins:/opt/airflow/plugins
    # Docker socket — necessário para DockerOperator
    - /var/run/docker.sock:/var/run/docker.sock
    # Credenciais montadas como read-only → NUNCA hardcode aqui
    - ~/.aws:/root/.aws:ro
    - ~/.databrickscfg:/root/.databrickscfg:ro
  depends_on:
    airflow-postgres-prd:
      condition: service_healthy

###############################################################################
# Serviços
###############################################################################

volumes:
  airflow_prd_postgres:
  airflow_prd_logs:
  airflow_prd_plugins:

networks:
  airflow_prd_net:
    driver: bridge

services:

  # ---------------------------------------------------------------------------
  # Banco de metadados do Airflow (PostgreSQL)
  # ---------------------------------------------------------------------------
  airflow-postgres-prd:
    image: postgres:16-alpine
    container_name: airflow-postgres-prd
    restart: on-failure
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_prd_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    networks:
      - airflow_prd_net

  # ---------------------------------------------------------------------------
  # Inicialização única
  # ---------------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init-prd
    restart: "no"
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin \
          --firstname Admin \
          --lastname Admin \
          --role Admin \
          --email admin@datamaster.io \
          --password "${AIRFLOW_ADMIN_PASSWORD:-changeme}"
        echo "Airflow PRD initialized."

  # ---------------------------------------------------------------------------
  # Scheduler
  # ---------------------------------------------------------------------------
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler-prd
    command: scheduler
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8974/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Webserver — UI em http://localhost:8091
  # ---------------------------------------------------------------------------
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver-prd
    command: webserver
    ports:
      - "8091:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      airflow-scheduler:
        condition: service_healthy
