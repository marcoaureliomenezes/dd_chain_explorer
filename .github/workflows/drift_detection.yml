          echo "::error::DRIFT DETECTED in PRD/VPC — unexpected pending changes found."
          exit 1

  drift-prd-iam:
    name: Drift — PRD/IAM
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/prd/03_iam
