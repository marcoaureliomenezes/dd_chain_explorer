# Redis local (container 'redis' em local_services.yml) — DEV environment
# Substitui ElastiCache Redis em DEV

REDIS_HOST=redis
REDIS_PORT=6379
# REDIS_PASSWORD=   # sem senha em DEV (ElastiCache auth token é configurado em PROD via SSM/Secrets Manager)

# Índices de database Redis por caso de uso
REDIS_DB_APK_SEMAPHORE=0     # semáforo de API keys (APIKeysManager)
REDIS_DB_APK_COUNTER=1       # contador de requisições por API key
REDIS_DB_BLOCK_CACHE=2       # cache de hashes de blocos (OrphanBlocksProcessor)
REDIS_DB_SEMAPHORE_DISPLAY=3 # display do estado dos semáforos (n_semaphore_collect)

# App mode: dev = Redis local / prod = ElastiCache com TLS
APP_ENV=dev
