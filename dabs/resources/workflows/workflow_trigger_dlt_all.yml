resources:
  jobs:
    workflow_trigger_dlt_all:
      name: "dm-trigger-dlt-all"

      # Schedule consolidado: dispara DLT Ethereum → App Logs sequencialmente.
      # Free Edition permite apenas 1 DLT pipeline ativo por vez.
      # Substitui: dag_5min_dlt_ethereum.py (Airflow)
      schedule:
        quartz_cron_expression: "0 0/30 * * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED  # Despausar após validação em PROD

      max_concurrent_runs: 1

      tasks:
        - task_key: trigger_ethereum
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_ethereum.id}
            full_refresh: false
        - task_key: trigger_app_logs
          depends_on:
            - task_key: trigger_ethereum
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_app_logs.id}
            full_refresh: false

      tags:
        layer: streaming
        project: dd-chain-explorer
        trigger: schedule
