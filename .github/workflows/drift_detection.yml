  drift-prd-peripherals:
    name: Drift — PRD/Peripherals
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/prd/04_peripherals
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - name: Terraform Plan (Drift Check)
        id: plan
        run: bash "$GITHUB_WORKSPACE/scripts/ci/tf_plan.sh"
        env:
          MODULE_NAME: PRD/Peripherals
          TAIL_LINES: "30"
          TF_VAR_project_version: "drift-check"
      - name: Alert on drift
        if: steps.plan.outputs.plan_has_changes == 'true'
