name: Deploy Databricks (DABs)

on:
  push:
    branches:
      - master
    paths:
      - 'dabs/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'DABs target (dev or prod)'
        required: true
        default: 'prod'
        type: choice
        options:
          - dev
          - prod

env:
  DATABRICKS_CLI_VERSION: 0.218.0
  DABS_PATH: dabs

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.DABS_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.218.0

      - name: Validate bundle
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}
        run: databricks bundle validate --target prod

  deploy-prod:
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.DABS_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.218.0

      - name: Deploy bundle to PROD
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}
        run: |
          databricks bundle deploy --target prod \
            --var="prod_workspace_host=${{ secrets.DATABRICKS_PROD_HOST }}" \
            --var="kafka_bootstrap_servers=${{ secrets.MSK_BOOTSTRAP_SERVERS }}" \
            --var="dynamodb_semaphore_table=${{ secrets.DYNAMODB_SEMAPHORE_TABLE }}" \
            --var="dynamodb_consumption_table=${{ secrets.DYNAMODB_CONSUMPTION_TABLE }}" \
            --var="dynamodb_popular_contracts_table=${{ secrets.DYNAMODB_POPULAR_CONTRACTS_TABLE }}"

      - name: Verify deployment
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_PROD_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_PROD_TOKEN }}
        run: |
          echo "=== DLT Pipelines ==="
          databricks pipelines list --output json | jq '.[] | .name'
          echo "=== Workflows ==="
          databricks jobs list --output json | jq '.jobs[] | .settings.name'
