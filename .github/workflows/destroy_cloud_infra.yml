name: Destroy Infra Cloud

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment to destroy'
        required: true
        type: choice
        options:
          - DEV (Cloud AWS)
          - hml
          - prd
      confirm:
        description: 'Type DESTROY to confirm infrastructure destruction'
        required: true
        type: string
      full_destroy:
        description: 'HML only: destroy ALL modules (VPC, IAM, Peripherals, ECS, Databricks). Default false = Databricks-only (~$11/month idle preserved).'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  AWS_REGION: sa-east-1
  TF_VERSION: 1.7.0

jobs:

  safety-check:
    name: Safety check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce develop branch
        run: bash "$GITHUB_WORKSPACE/scripts/ci/branch_guard.sh"
      - name: Validate confirmation
        run: bash "$GITHUB_WORKSPACE/scripts/ci/check_commit_confirmation.sh"
        env:
          CONFIRM: ${{ github.event.inputs.confirm }}

  # ══════════════════════════════════════════════════════════════
  #  DEV
  # ══════════════════════════════════════════════════════════════

  dev-destroy:
    name: DEV — Destroy all modules
    concurrency:
      group: tf-dev-destroy
      cancel-in-progress: false
    needs: safety-check
    if: github.event.inputs.environment == 'DEV (Cloud AWS)'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Destroy DEV
        run: bash "$GITHUB_WORKSPACE/scripts/ci/destroy_env.sh" dev

  # ══════════════════════════════════════════════════════════════
  #  HML
  # ══════════════════════════════════════════════════════════════
  # - full_destroy=false (default): only Databricks is destroyed.
  #   VPC, IAM, Peripherals and ECS are preserved (~$11/month idle).
  # - full_destroy=true: full teardown — all modules destroyed, S3 preserved.
  #   Use to test full destroy/redeploy cycle or before extended pauses.

  hml-destroy:
    name: HML — Destroy modules
    concurrency:
      group: tf-hml-destroy
      cancel-in-progress: false
    needs: safety-check
    if: github.event.inputs.environment == 'hml'
    runs-on: ubuntu-latest
    environment: hml
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Destroy HML
        run: bash "$GITHUB_WORKSPACE/scripts/ci/destroy_env.sh" hml "${{ github.event.inputs.full_destroy }}"
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

  # ══════════════════════════════════════════════════════════════
  #  PRD
  # ══════════════════════════════════════════════════════════════

  prd-destroy:
    name: PRD — Destroy all modules
    concurrency:
      group: tf-prd-destroy
      cancel-in-progress: false
    needs: safety-check
    if: github.event.inputs.environment == 'prd'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Destroy PRD
        run: bash "$GITHUB_WORKSPACE/scripts/ci/destroy_env.sh" prd
        env:
          DATABRICKS_ACCOUNT_ID:           ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:            ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET:        ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          TF_VAR_databricks_client_id:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

