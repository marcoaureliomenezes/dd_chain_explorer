; Topics Configuration
; Usado por 0_topics_creator.py para criar os tópicos no Kafka.
; O nome final do tópico será: {NETWORK}.{name}  (ex: mainnet.0.application.logs)

[topic.general.config]
retention.ms=604800000
cleanup.policy=delete

[topic.application.logs]
name=0.application.logs
num_partitions=1
replication_factor=1

[topic.batch.logs]
name=0.batch.logs
num_partitions=1
replication_factor=1

[topic.mined_blocks.events]
name=1.mined_blocks.events
num_partitions=1
replication_factor=1

[topic.blocks_data]
name=2.blocks.data
num_partitions=1
replication_factor=1

[topic.block_txs.hash_ids]
name=3.block.txs.hash_id
num_partitions=8
replication_factor=1

[topic.txs.raw_data]
name=4.transactions.data
num_partitions=8
replication_factor=1

[topic.txs.input_decoded]
name=5.txs.input_decoded
num_partitions=4
replication_factor=1
