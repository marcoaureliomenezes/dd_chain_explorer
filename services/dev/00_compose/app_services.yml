x-conf-dev-onchain-stream-txs: &conf_dev_onchain_stream_txs
  restart: on-failure
  env_file:
    - ./conf/dev.dynamodb.conf  # common: DynamoDB, CloudWatch, Kinesis, SQS, NETWORK
  networks:
    - vpc_dm
  build:
    context: ../../../
    dockerfile: docker/onchain-stream-txs/Dockerfile
  volumes:
    - ../../../docker/onchain-stream-txs/src:/app
    - ../../../utils/src/dm_chain_utils:/app/dm_chain_utils
    - ~/.aws:/root/.aws:ro   # credenciais reais do host (SSM, Kinesis, SQS, etc.)

services:

  ################################################################################################
  ############################    PYTHON APPLICATIONS    #########################################


  python-job-mined-blocks-watcher:
    <<: *conf_dev_onchain_stream_txs
    container_name: python-job-mined-blocks-watcher
    entrypoint: "python -u /app/1_mined_blocks_watcher.py"
    environment:
      SSM_SECRET_NAME: '/web3-api-keys/alchemy/api-key-1'
      CLOCK_FREQUENCY: 1


  python-job-orphan-blocks-watcher:
    <<: *conf_dev_onchain_stream_txs
    container_name: python-job-orphan-blocks-watcher
    entrypoint: "python -u /app/2_orphan_blocks_watcher.py"
    environment:
      SSM_SECRET_NAME: '/web3-api-keys/alchemy/api-key-2'
      NUM_CONFIRMATIONS: 10


  python-job-block-data-crawler:
    <<: *conf_dev_onchain_stream_txs
    container_name: python-job-block-data-crawler
    entrypoint: "python -u /app/3_block_data_crawler.py"
    environment:
      SSM_SECRET_NAME: '/web3-api-keys/alchemy/api-key-2'
      TXS_PER_BLOCK: 50


  python-job-transactions-crawler:
    <<: *conf_dev_onchain_stream_txs
    entrypoint: "python -u /app/4_mined_txs_crawler.py"
    environment:
      SSM_SECRET_NAMES: '/web3-api-keys/infura/api-key-1-17'
    deploy:
      replicas: 6


  python-job-txs-input-decoder:
    <<: *conf_dev_onchain_stream_txs
    entrypoint: "python -u /app/5_txs_input_decoder.py"
    deploy:
      replicas: 3
    environment:
      SSM_ETHERSCAN_PATH: /etherscan-api-keys
      UNVERIFIED_TTL: 86400


networks:
  vpc_dm:
    external: true