name: Deploy Streaming Apps

on:
  workflow_dispatch:

env:
  AWS_REGION:  sa-east-1
  ECS_CLUSTER: dm-chain-explorer-ecs
  ECR_REPO:    onchain-stream-txs

jobs:
  # ----------------------------------------------------------------
  # Gate — lint + unit tests
  # ----------------------------------------------------------------
  lint-and-test:
    name: Lint & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: utils/pyproject.toml

      - name: Install dm-chain-utils (dev extras)
        run: pip install --upgrade pip && pip install "utils/[dev]"

      - name: Run unit tests
        run: pytest utils/tests/unit/ -v --tb=short

      - name: Validate Docker Compose — app_services
        run: docker compose -f services/dev/compose/app_services.yml config --quiet

  # ----------------------------------------------------------------
  # Idempotency check — skip if same SHA already deployed
  # ----------------------------------------------------------------
  check-idempotency:
    name: Check if deploy is needed
    needs: lint-and-test
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Compare HEAD SHA with deployed ECR tag
        id: check
        run: |
          CURRENT_SHA=$(git rev-parse --short HEAD)
          DEPLOYED_SHA=$(aws ecr describe-images \
            --repository-name "${{ env.ECR_REPO }}" \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageTags' \
            --output json 2>/dev/null \
            | jq -r '.[] | select(. != "latest")' | head -1) || DEPLOYED_SHA=""
          echo "Current SHA:  $CURRENT_SHA"
          echo "Deployed SHA: $DEPLOYED_SHA"
          if [ "$CURRENT_SHA" = "$DEPLOYED_SHA" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "::notice::Image for SHA $CURRENT_SHA already deployed — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

  # ----------------------------------------------------------------
  # Build + Push — onchain-stream-txs
  # ----------------------------------------------------------------
  build-and-push:
    name: Build & push onchain-stream-txs
    needs: check-idempotency
    if: needs.check-idempotency.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set image tag & ECR registry
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin "${{ env.ECR_REGISTRY }}"

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context:    .
          file:       docker/onchain-stream-txs/Dockerfile
          push:       true
          tags: |
            ${{ env.ECR_REGISTRY }}/onchain-stream-txs:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/onchain-stream-txs:latest

  # ----------------------------------------------------------------
  # Deploy — update ECS services
  # ----------------------------------------------------------------
  deploy-ecs:
    name: Deploy to ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set image tag & ECR registry
        run: |
          echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "ECR_REGISTRY=$(aws sts get-caller-identity --query Account --output text).dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV

      - name: Update ECS task definitions and force deploy
        run: |
          SERVICES=(
            dm-mined-blocks-watcher
            dm-orphan-blocks-watcher
            dm-block-data-crawler
            dm-mined-txs-crawler
            dm-txs-input-decoder
          )
          for SVC in "${SERVICES[@]}"; do
            echo "::group::Updating $SVC"
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition "$SVC" \
              --query 'taskDefinition' --output json)
            NEW_TASK_DEF=$(echo "$TASK_DEF" | jq \
              --arg img "${{ env.ECR_REGISTRY }}/onchain-stream-txs:${{ env.IMAGE_TAG }}" \
              '.containerDefinitions[0].image = $img
               | del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                     .placementConstraints, .compatibilities, .registeredAt, .registeredBy)')
            NEW_TASK_ARN=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEF" \
              --query 'taskDefinition.taskDefinitionArn' --output text)
            aws ecs update-service \
              --cluster "${{ env.ECS_CLUSTER }}" \
              --service "$SVC" \
              --task-definition "$NEW_TASK_ARN" \
              --force-new-deployment \
              --query 'service.serviceName'
            echo "::endgroup::"
          done

      - name: Wait for ECS services to stabilize
        run: |
          echo "Waiting for ECS services to stabilize (timeout: 10 min)..."
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services \
              dm-mined-blocks-watcher \
              dm-orphan-blocks-watcher \
              dm-block-data-crawler \
              dm-mined-txs-crawler \
              dm-txs-input-decoder \
            --region "${{ env.AWS_REGION }}" || {
            echo "::error::ECS deploy unstable — circuit breaker may have triggered rollback."
            echo "::error::Check logs at CloudWatch: /ecs/dm-chain-explorer"
            exit 1
          }
          echo "All ECS services are stable."
