name: Deploy Python Lib

on:
  workflow_dispatch:

env:
  LIB_PATH: utils

jobs:
  branch-guard:
    name: Branch guard
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::This workflow must be triggered from the 'develop' branch. Got: ${{ github.ref }}"
            exit 1
          fi

  check-version:
    name: Check version consistency
    needs: branch-guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate VERSION file matches pyproject.toml
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          TOML_VERSION=$(python3 -c "
import re, pathlib
text = pathlib.Path('${{ env.LIB_PATH }}/pyproject.toml').read_text()
m = re.search(r'version\s*=\s*[\"'"'"']([^\"'"'"']+)[\"'"'"']', text)
print(m.group(1))
")
          echo "VERSION file  : $FILE_VERSION"
          echo "pyproject.toml: $TOML_VERSION"
          if [ "$FILE_VERSION" != "$TOML_VERSION" ]; then
            echo "::error::VERSION file ($FILE_VERSION) does not match utils/pyproject.toml ($TOML_VERSION). Keep them in sync."
            exit 1
          fi
          if git tag --list | grep -qx "v${FILE_VERSION}-lib"; then
            echo "::error::Version v${FILE_VERSION}-lib is already tagged. Bump VERSION and pyproject.toml before deploying."
            exit 1
          fi
          echo "Version v${FILE_VERSION} is consistent and new — proceeding."

  test:
    name: Test
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: utils/pyproject.toml
      - run: pip install --upgrade pip && pip install "${{ env.LIB_PATH }}/[dev]"
      - run: pytest ${{ env.LIB_PATH }}/tests/unit/ -v --tb=short

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip build
      - run: python -m build "${{ env.LIB_PATH }}"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ${{ env.LIB_PATH }}/dist/

  version-check:
    name: Check version is newer than PyPI
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.local.outputs.version }}
      name:    ${{ steps.local.outputs.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Extract local version
        id: local
        run: |
          VERSION=$(python3 -c "
import re, pathlib
text = pathlib.Path('${{ env.LIB_PATH }}/pyproject.toml').read_text()
print(re.search(r'version\s*=\s*[\"'"'"']([^\"'"'"']+)[\"'"'"']', text).group(1))
")
          NAME=$(python3 -c "
import re, pathlib
text = pathlib.Path('${{ env.LIB_PATH }}/pyproject.toml').read_text()
print(re.search(r'name\s*=\s*[\"'"'"']([^\"'"'"']+)[\"'"'"']', text).group(1))
")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME"       >> $GITHUB_OUTPUT
          echo "Local: $NAME==$VERSION"
      - name: Compare with PyPI
        run: |
          PYPI_VERSION=$(curl -sf "https://pypi.org/pypi/${{ steps.local.outputs.name }}/json" \
            | jq -r '.info.version' 2>/dev/null) || PYPI_VERSION="0.0.0"
          echo "PyPI version : $PYPI_VERSION"
          echo "Local version: ${{ steps.local.outputs.version }}"
          python3 -c "
from packaging.version import Version
local = Version('${{ steps.local.outputs.version }}')
pypi  = Version('${PYPI_VERSION}')
if local <= pypi:
    raise SystemExit(f'Local {local} is not newer than PyPI {pypi}. Bump the version in pyproject.toml.')
print(f'OK: {local} > {pypi}')
"

  publish:
    name: Publish to PyPI
    needs: version-check
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  create-release-branch:
    name: Create release branch
    needs: [version-check, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Create and push release branch
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          BRANCH="release/lib-v${VERSION}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          echo "## Release Branch" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`$BRANCH\`" >> $GITHUB_STEP_SUMMARY

  github-release:
    name: Create GitHub Release
    needs: [version-check, create-release-branch]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Create release and git tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          TAG="v${VERSION}-lib"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh release create "$TAG" dist/* \
            --title "${{ needs.version-check.outputs.name }} v${VERSION}" \
            --generate-notes
          echo "## Release Complete" >> $GITHUB_STEP_SUMMARY
          echo "PyPI: \`${{ needs.version-check.outputs.name }}==${VERSION}\` | Git tag: \`${TAG}\`" >> $GITHUB_STEP_SUMMARY

