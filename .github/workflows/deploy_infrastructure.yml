name: Deploy Infrastructure (Terraform AWS + Databricks)

on:
  push:
    branches:
      - master
    paths:
      - 'services/prd/terraform/**'
  workflow_dispatch:
    inputs:
      target_module:
        description: 'Módulo terraform a aplicar (leave empty for all)'
        required: false
        default: ''

env:
  AWS_REGION: sa-east-1
  TF_VERSION: 1.7.0

jobs:
  # ----------------------------------------------------------------
  # Detecta quais módulos terraform foram alterados
  # ----------------------------------------------------------------
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.detect.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed terraform modules
        id: detect
        run: |
          if [ -n "${{ github.event.inputs.target_module }}" ]; then
            echo "modules=[\"${{ github.event.inputs.target_module }}\"]" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'services/prd/terraform/**' \
              | awk -F'/' '{print $4}' | sort -u | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "modules=$CHANGED" >> $GITHUB_OUTPUT
          fi

  # ----------------------------------------------------------------
  # Validação e plan para todos os módulos alterados
  # ----------------------------------------------------------------
  terraform-plan:
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.modules != '[]'
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    defaults:
      run:
        working-directory: services/prd/terraform/${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: terraform init
        run: terraform init -input=false

      - name: terraform validate
        run: terraform validate

      - name: terraform plan
        id: plan
        run: terraform plan -input=false -out=tfplan
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}
          path: services/prd/terraform/${{ matrix.module }}/tfplan
          retention-days: 1

  # ----------------------------------------------------------------
  # Apply — só roda após aprovação manual (environment: production)
  # ----------------------------------------------------------------
  terraform-apply:
    needs: terraform-plan
    runs-on: ubuntu-latest
    environment: production
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect-changes.outputs.modules) }}
    defaults:
      run:
        working-directory: services/prd/terraform/${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform ${{ env.TF_VERSION }}
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.module }}
          path: services/prd/terraform/${{ matrix.module }}

      - name: terraform init
        run: terraform init -input=false

      - name: terraform apply
        run: terraform apply -input=false -auto-approve tfplan
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
