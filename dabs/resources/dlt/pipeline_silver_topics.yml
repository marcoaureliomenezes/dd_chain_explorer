resources:
  pipelines:
    pipeline_silver_topics:
      name: "[${bundle.target}] dm-silver-topics"

      catalog: ${var.catalog}
      target: s_fast

      libraries:
        - notebook:
            path: ../../src/streaming/3_pipeline_silver_topics.py

      configuration:
        # Bronze table coordinates (cross-pipeline read)
        bronze_catalog: ${var.catalog}
        bronze_schema: "b_fast"
        bronze_table: "kafka_topics_multiplexed"

      serverless: true

      development: ${var.dlt_development}
      continuous: ${var.dlt_continuous}
      channel: CURRENT
