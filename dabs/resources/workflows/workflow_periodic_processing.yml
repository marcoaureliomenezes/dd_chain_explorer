resources:
  jobs:
    workflow_periodic_processing:
      name: "[${bundle.target}] dm-periodic-processing"
      description: >
        Workflow de processamento periódico.
        1) Identifica contratos populares a partir de transações Silver.
        2) Ingere transações históricas dos contratos populares via Etherscan.
        Equivalente aos jobs em spark-batch-jobs/periodic_spark_processing + Airflow DAGs.

      schedule:
        quartz_cron_expression: "0 0 */6 * * ?"  # every 6 hours
        timezone_id: "America/Sao_Paulo"

      tasks:
        - task_key: get_popular_contracts
          description: "Identifica contratos mais transacionados (Redis → DynamoDB)"
          notebook_task:
            notebook_path: ../src/batch/periodic/1_get_popular_contracts.py
            source: WORKSPACE
            base_parameters:
              dynamodb_table: ${var.dynamodb_popular_contracts_table}
              catalog: ${var.catalog}
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1

        - task_key: ingest_contracts_txs
          description: "Ingere transações históricas de contratos populares via Etherscan"
          depends_on:
            - task_key: get_popular_contracts
          notebook_task:
            notebook_path: ../src/batch/periodic/2_ingest_contracts_txs.py
            source: WORKSPACE
            base_parameters:
              raw_s3_bucket: ${var.raw_s3_bucket}
              catalog: ${var.catalog}
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 2
            spark_conf:
              spark.hadoop.fs.s3a.aws.credentials.provider: "com.amazonaws.auth.InstanceProfileCredentialsProvider"

      email_notifications:
        on_failure:
          - marco@example.com

      tags:
        layer: periodic
        project: dd-chain-explorer
