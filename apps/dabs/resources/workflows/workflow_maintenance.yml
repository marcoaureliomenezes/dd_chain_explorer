resources:
  jobs:
    workflow_maintenance:
      name: "dm-iceberg-maintenance"

      # Schedule a cada 12h — substitui dag_periodic_maintenance_streaming_tables.py (Airflow)
      schedule:
        quartz_cron_expression: "0 0 4,16 * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED  # Despausar após validação em PROD

      max_concurrent_runs: 1

      tasks:
        - task_key: optimize_bronze
          spark_python_task:
            python_file: ../../src/batch/maintenance/maintenance.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--step"
              - "optimize-bronze"

        - task_key: optimize_silver
          depends_on:
            - task_key: optimize_bronze
          spark_python_task:
            python_file: ../../src/batch/maintenance/maintenance.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--step"
              - "optimize-silver"

        - task_key: vacuum_all
          depends_on:
            - task_key: optimize_silver
          spark_python_task:
            python_file: ../../src/batch/maintenance/maintenance.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--step"
              - "vacuum"

        - task_key: monitor_tables
          depends_on:
            - task_key: vacuum_all
          spark_python_task:
            python_file: ../../src/batch/maintenance/maintenance.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--step"
              - "monitor"

      tags:
        layer: maintenance
        project: dd-chain-explorer
