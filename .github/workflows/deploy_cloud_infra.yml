name: Deploy Infra Cloud

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - DEV (Cloud AWS)
          - prd
      force_apply:
        description: 'Force apply / skip version tag check (PRD only)'
        required: false
        default: false
        type: boolean
      skip_databricks:
        description: 'Skip 05_databricks module (PRD only)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  AWS_REGION:      sa-east-1
  TF_VERSION:      1.7.0
  PRD_ROOT:        services/prd
  DEV_PERIPHERALS: services/dev/01_peripherals
  DEV_LAMBDA:      services/dev/02_lambda

jobs:

  # ── Branch guard ───────────────────────────────────────────────
  branch-guard:
    name: Branch guard
    runs-on: ubuntu-latest
    steps:
      - name: Enforce develop branch
        run: |
          if [ "${{ github.ref }}" != "refs/heads/develop" ]; then
            echo "::error::This workflow must be triggered from the 'develop' branch. Got: ${{ github.ref }}"
            exit 1
          fi

  # ══════════════════════════════════════════════════════════════
  #  DEV (Cloud AWS)
  # ══════════════════════════════════════════════════════════════

  dev-detect-changes:
    name: DEV — Detect changes
    needs: branch-guard
    if: github.event.inputs.environment == 'DEV (Cloud AWS)'
    runs-on: ubuntu-latest
    outputs:
      peripherals_changed: ${{ steps.detect.outputs.peripherals_changed }}
      lambda_changed:      ${{ steps.detect.outputs.lambda_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine changed modules
        id: detect
        run: |
          FORCE="${{ github.event.inputs.force_apply }}"
          if [ "$FORCE" = "true" ]; then
            echo "peripherals_changed=true" >> $GITHUB_OUTPUT
            echo "lambda_changed=true"      >> $GITHUB_OUTPUT
            echo "Forced — all DEV modules will be applied."
          else
            DIFF=$(git diff --name-only origin/develop...HEAD 2>/dev/null || git diff --name-only HEAD~1 HEAD)
            echo "Changed files: $DIFF"
            if echo "$DIFF" | grep -q "${{ env.DEV_PERIPHERALS }}/"; then
              echo "peripherals_changed=true" >> $GITHUB_OUTPUT
            else
              echo "peripherals_changed=false" >> $GITHUB_OUTPUT
            fi
            if echo "$DIFF" | grep -q "${{ env.DEV_LAMBDA }}/"; then
              echo "lambda_changed=true" >> $GITHUB_OUTPUT
            else
              echo "lambda_changed=false" >> $GITHUB_OUTPUT
            fi
          fi

  dev-deploy-peripherals:
    name: DEV — Deploy Peripherals AWS
    needs: dev-detect-changes
    if: needs.dev-detect-changes.outputs.peripherals_changed == 'true'
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.DEV_PERIPHERALS }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode > plan.txt 2>&1
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi
          echo "plan_has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - if: always()
        run: |
          echo "### Plan DEV/Peripherals" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -20 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  dev-deploy-lambda:
    name: DEV — Deploy Lambda AWS
    needs: [dev-detect-changes, dev-deploy-peripherals]
    if: |
      always() &&
      needs.dev-detect-changes.outputs.lambda_changed == 'true' &&
      (needs.dev-deploy-peripherals.result == 'success' || needs.dev-deploy-peripherals.result == 'skipped')
    runs-on: ubuntu-latest
    environment: dev
    defaults:
      run:
        working-directory: ${{ env.DEV_LAMBDA }}
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: mkdir -p .lambda_zip
      - run: terraform init -input=false
      - run: terraform validate
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode > plan.txt 2>&1
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi
          echo "plan_has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - if: always()
        run: |
          echo "### Plan DEV/Lambda" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -20 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  # ══════════════════════════════════════════════════════════════
  #  PRD — Layer 0: version check (gate for all PRD jobs)
  # ══════════════════════════════════════════════════════════════

  prd-check-version:
    name: PRD — Check version
    needs: branch-guard
    if: github.event.inputs.environment == 'prd'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Read and validate VERSION
        id: ver
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [ "${{ github.event.inputs.force_apply }}" = "true" ]; then
            echo "force_apply — skipping tag check."
          elif git tag --list | grep -qx "v${VERSION}-infra"; then
            echo "::error::v${VERSION}-infra already tagged. A new PR merge to develop is required to bump VERSION."
            exit 1
          fi
          echo "Version v${VERSION} — OK."
          echo "## Version Check" >> $GITHUB_STEP_SUMMARY
          echo "Deploying PRD infra **v${VERSION}**" >> $GITHUB_STEP_SUMMARY

  # ── PRD Layer 1: VPC + Peripherals (parallel) ─────────────────

  prd-deploy-vpc:
    name: PRD — Deploy VPC AWS
    needs: prd-check-version
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/02_vpc
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode > plan.txt 2>&1
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi
          echo "plan_has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - if: always()
        run: |
          echo "### Plan PRD/VPC" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  prd-deploy-peripherals:
    name: PRD — Deploy Peripherals AWS
    needs: prd-check-version
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/04_peripherals
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode > plan.txt 2>&1
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi
          echo "plan_has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - if: always()
        run: |
          echo "### Plan PRD/Peripherals" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  # ── PRD Layer 2: IAM (depends on VPC + Peripherals) ────────────

  prd-deploy-iam:
    name: PRD — Deploy IAM AWS
    needs: [prd-deploy-vpc, prd-deploy-peripherals]
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/03_iam
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode > plan.txt 2>&1
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi
          echo "plan_has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - if: always()
        run: |
          echo "### Plan PRD/IAM" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  # ── PRD Layer 3: Databricks Account + Lambda + ECS (parallel) ──

  prd-deploy-databricks-account:
    name: PRD — Deploy Databricks Part 1 - Account
    needs: prd-deploy-iam
    if: github.event.inputs.skip_databricks != 'true'
    runs-on: ubuntu-latest
    environment: production
    outputs:
      workspace_url:   ${{ steps.ws_out.outputs.workspace_url }}
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/05a_databricks_account
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - name: Import existing Databricks account resources (idempotent)
        env:
          DATABRICKS_ACCOUNT_ID:       ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:        ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET:    ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
        run: |
          # Acquire OAuth token via M2M client credentials
          TOKEN=$(curl -sf -X POST \
            "https://accounts.cloud.databricks.com/oidc/accounts/${DATABRICKS_ACCOUNT_ID}/v1/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=client_credentials" \
            --data-urlencode "client_id=${DATABRICKS_CLIENT_ID}" \
            --data-urlencode "client_secret=${DATABRICKS_CLIENT_SECRET}" \
            --data-urlencode "scope=all-apis" \
            | jq -r '.access_token' 2>/dev/null || true)
          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "::error::Could not acquire Databricks OAuth token — check DATABRICKS_CLIENT_ID/SECRET secrets."
            exit 1
          fi
          ACCT="https://accounts.cloud.databricks.com/api/2.0/accounts/${DATABRICKS_ACCOUNT_ID}"
          AUTH="Authorization: Bearer $TOKEN"

          tf_import() {
            local label="$1" addr="$2" id="$3"
            if terraform state show "$addr" &>/dev/null; then
              echo "  ${label}: already in state — skipping."
              return 0
            fi
            if terraform import "$addr" "$id"; then
              echo "  ${label}: imported OK."
            else
              echo "  ${label}: not found in Databricks — will be created by apply."
            fi
          }

          echo "==> Checking for pre-existing Databricks account resources to import..."

          CRED_ID=$(curl -sf -H "$AUTH" "${ACCT}/credentials" 2>/dev/null \
            | jq -r '[.[] | select(.credentials_name=="dm-chain-explorer-credentials")][0].credentials_id // empty' 2>/dev/null || true)
          [ -n "$CRED_ID" ] && tf_import "MWS credentials" "databricks_mws_credentials.dm" "${DATABRICKS_ACCOUNT_ID}/${CRED_ID}"

          STOR_ID=$(curl -sf -H "$AUTH" "${ACCT}/storage-configurations" 2>/dev/null \
            | jq -r '[.[] | select(.storage_configuration_name=="dm-chain-explorer-storage")][0].storage_configuration_id // empty' 2>/dev/null || true)
          [ -n "$STOR_ID" ] && tf_import "MWS storage config" "databricks_mws_storage_configurations.dm" "${DATABRICKS_ACCOUNT_ID}/${STOR_ID}"

          NET_ID=$(curl -sf -H "$AUTH" "${ACCT}/networks" 2>/dev/null \
            | jq -r '[.[] | select(.network_name=="dm-chain-explorer-network")][0].network_id // empty' 2>/dev/null || true)
          [ -n "$NET_ID" ] && tf_import "MWS network" "databricks_mws_networks.dm" "${DATABRICKS_ACCOUNT_ID}/${NET_ID}"

          WS_ID=$(curl -sf -H "$AUTH" "${ACCT}/workspaces" 2>/dev/null \
            | jq -r '[.[] | select(.workspace_name=="dm-chain-explorer-prd")][0].workspace_id // empty' 2>/dev/null || true)
          [ -n "$WS_ID" ] && tf_import "MWS workspace" "databricks_mws_workspaces.dm" "${DATABRICKS_ACCOUNT_ID}/${WS_ID}"

          MS_ID=$(curl -sf -H "$AUTH" "https://accounts.cloud.databricks.com/api/2.1/unity-catalog/metastores" 2>/dev/null \
            | jq -r '[.metastores[]? | select(.name=="dm-chain-explorer-metastore")][0].metastore_id // empty' 2>/dev/null || true)
          [ -n "$MS_ID" ] && tf_import "Unity Catalog metastore" "databricks_metastore.dm" "$MS_ID"

          if [ -n "${WS_ID:-}" ] && [ -n "${MS_ID:-}" ]; then
            tf_import "Metastore assignment" "databricks_metastore_assignment.dm" "${WS_ID}/${MS_ID}"
          fi

          # Import metastore data access (storage credential) if it already exists
          if [ -n "${MS_ID:-}" ]; then
            SC_NAME="dm-metastore-data-access"
            SC_EXISTS=$(curl -sf -H "$AUTH" \
              "https://accounts.cloud.databricks.com/api/2.1/unity-catalog/storage-credentials" 2>/dev/null \
              | jq -r --arg n "$SC_NAME" '[.storage_credentials[]? | select(.name==$n)][0].name // empty' 2>/dev/null || true)
            [ -n "$SC_EXISTS" ] && tf_import "Metastore data access" "databricks_metastore_data_access.default" "${MS_ID}|${SC_NAME}"
          fi

          # Import MWS permission assignments if workspace exists
          if [ -n "${WS_ID:-}" ]; then
            PA_JSON=$(curl -sf -H "$AUTH" \
              "${ACCT}/workspaces/${WS_ID}/permissionassignments" 2>/dev/null \
              | jq -r '[.permission_assignments[]? | select(any(.permissions[]?; . == "ADMIN")) | .principal.principal_id]' 2>/dev/null || true)

            # Import user admin assignment (first non-SP principal that is a user)
            PA_USER=$(echo "$PA_JSON" | jq -r '.[0] // empty' 2>/dev/null || true)
            [ -n "$PA_USER" ] && tf_import "MWS permission assignment (admin user)" "databricks_mws_permission_assignment.admin" "${WS_ID}|${PA_USER}"

            # Import SP admin assignment (service principal = DATABRICKS_CLIENT_ID)
            # SP application_id matches TF_VAR_databricks_client_id; look up its principal_id
            SP_PRINCIPAL_ID=$(curl -sf -H "$AUTH" \
              "${ACCT}/servicePrincipals" 2>/dev/null \
              | jq -r --arg cid "${TF_VAR_databricks_client_id}" \
                '[.ServicePrincipals[]? | select(.applicationId==($cid|tonumber))][0].id // empty' 2>/dev/null || true)
            if [ -n "$SP_PRINCIPAL_ID" ]; then
              SP_PA_ID=$(echo "$PA_JSON" | jq -r --arg pid "$SP_PRINCIPAL_ID" 'map(select(. == ($pid|tonumber))) | .[0] // empty' 2>/dev/null || true)
              [ -n "$SP_PA_ID" ] && tf_import "MWS permission assignment (terraform SP)" "databricks_mws_permission_assignment.terraform_sp" "${WS_ID}|${SP_PA_ID}"
            fi
          fi

          echo "==> Import check complete."
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode > plan.txt 2>&1
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi
          echo "plan_has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          TF_VAR_project_version:   ${{ steps.ver.outputs.version }}
          TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
      - if: always()
        run: |
          echo "### Plan PRD/Databricks Account" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan > apply.txt 2>&1; exit $?
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          TF_VAR_project_version:   ${{ steps.ver.outputs.version }}
          TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}
      - name: Dump apply errors
        if: failure()
        run: |
          echo "### Apply Error — PRD/Databricks Account" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -100 apply.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Export workspace outputs
        id: ws_out
        run: |
          WS_JSON=$(terraform output -json)
          WS_URL=$(echo "$WS_JSON" | jq -r '.databricks_workspace_url.value')
          echo "workspace_url=$WS_URL"   >> $GITHUB_OUTPUT
          echo "Workspace URL: $WS_URL"
        env:
          DATABRICKS_ACCOUNT_ID:    ${{ secrets.DATABRICKS_ACCOUNT_ID }}
          DATABRICKS_CLIENT_ID:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          TF_VAR_databricks_client_id: ${{ secrets.DATABRICKS_CLIENT_ID }}

  prd-deploy-lambda:
    name: PRD — Deploy Lambda AWS
    needs: prd-deploy-iam
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/06_lambda
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - run: mkdir -p .lambda_zip
      - run: terraform init -input=false
      - run: terraform validate
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode > plan.txt 2>&1
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi
          echo "plan_has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - if: always()
        run: |
          echo "### Plan PRD/Lambda" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  prd-deploy-ecs:
    name: PRD — Deploy ECS AWS
    needs: prd-deploy-iam
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/07_ecs
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode > plan.txt 2>&1
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi
          echo "plan_has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
      - if: always()
        run: |
          echo "### Plan PRD/ECS" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}

  # ── PRD Layer 4: Databricks Workspace (depends on Account) ─────

  prd-deploy-databricks-workspace:
    name: PRD — Deploy Databricks Part 2 - Workspace
    needs: prd-deploy-databricks-account
    if: github.event.inputs.skip_databricks != 'true'
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: ${{ env.PRD_ROOT }}/05b_databricks_workspace
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}
      - run: terraform init -input=false
      - run: terraform validate
      - name: Read VERSION
        id: ver
        run: echo "version=$(cat ${{ github.workspace }}/VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
      - name: Terraform Plan
        id: plan
        run: |
          set +e
          terraform plan -no-color -input=false -out=tfplan -detailed-exitcode > plan.txt 2>&1
          PLAN_EXIT=$?
          set -e
          if [ $PLAN_EXIT -eq 1 ]; then
            echo "::error::Terraform plan failed"
            exit 1
          fi
          echo "plan_has_changes=$([ $PLAN_EXIT -eq 2 ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
          TF_VAR_workspace_host:  ${{ needs.prd-deploy-databricks-account.outputs.workspace_url }}
          TF_VAR_databricks_client_id:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      - if: always()
        run: |
          echo "### Plan PRD/Databricks Workspace" >> $GITHUB_STEP_SUMMARY
          echo '```hcl' >> $GITHUB_STEP_SUMMARY; tail -15 plan.txt >> $GITHUB_STEP_SUMMARY; echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Terraform Apply
        if: steps.plan.outputs.plan_has_changes == 'true'
        run: terraform apply -input=false -auto-approve tfplan
        env:
          TF_VAR_project_version: ${{ steps.ver.outputs.version }}
          TF_VAR_workspace_host:  ${{ needs.prd-deploy-databricks-account.outputs.workspace_url }}
          TF_VAR_databricks_client_id:     ${{ secrets.DATABRICKS_CLIENT_ID }}
          TF_VAR_databricks_client_secret: ${{ secrets.DATABRICKS_CLIENT_SECRET }}

  # ── PRD git tag ────────────────────────────────────────────────

  prd-create-tag:
    name: PRD — Create git tag
    needs:
      - prd-check-version
      - prd-deploy-ecs
      - prd-deploy-lambda
      - prd-deploy-databricks-account
      - prd-deploy-databricks-workspace
    if: |
      always() &&
      needs.prd-check-version.result == 'success' &&
      needs.prd-deploy-ecs.result == 'success' &&
      needs.prd-deploy-lambda.result == 'success' &&
      (needs.prd-deploy-databricks-account.result == 'success' || needs.prd-deploy-databricks-account.result == 'skipped') &&
      (needs.prd-deploy-databricks-workspace.result == 'success' || needs.prd-deploy-databricks-workspace.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Tag master
        run: |
          VERSION="${{ needs.prd-check-version.outputs.version }}"
          TAG="v${VERSION}-infra"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin master
          git checkout master
          if git tag --list | grep -qx "$TAG"; then
            echo "Tag $TAG already exists — skipping." >> $GITHUB_STEP_SUMMARY
          else
            git tag -a "$TAG" -m "PRD infra v${VERSION}"
            git push origin "$TAG"
            echo "## Tag created: \`$TAG\` on master" >> $GITHUB_STEP_SUMMARY
          fi
