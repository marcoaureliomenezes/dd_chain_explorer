resources:
  jobs:
    workflow_dlt_full_refresh:
      name: "dm-dlt-full-refresh"

      # Sem schedule interno — acionado manualmente via Airflow DAG dag_backfill_reprocess
      # ou diretamente pelo operador via Databricks UI / CLI para reprocessamento histórico.
      #
      # Uso: reprocessa dados desde a fonte (Kafka ou S3) descartando checkpoints.
      # Em DEV (availableNow): reprocessa todos os arquivos S3 presentes no bucket.
      # Em PROD (continuous): para o pipeline, reinicia em full_refresh e reativa.

      tasks:
        - task_key: full_refresh_ethereum
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_ethereum.id}
            full_refresh: true

        - task_key: full_refresh_app_logs
          depends_on:
            - task_key: full_refresh_ethereum
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_app_logs.id}
            full_refresh: true

      tags:
        layer: streaming
        project: dd-chain-explorer
        trigger: manual
