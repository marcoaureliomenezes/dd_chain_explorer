###############################################################################
# services/compose/local_services.yml
#
# Serviços locais para desenvolvimento — replicam recursos AWS usados em PROD.
#
# Recursos replicados:
#   - Apache Kafka (MSK em PROD)           → kafka-broker-1  (KRaft, sem Zookeeper)
#   - Schema Registry (Confluent)          → schema-registry
#   - Confluent Control Center             → control-center  (UI de monitoramento)
#
# Como usar:
#   docker network create vpc_dm
#   docker compose -f local_services.yml up -d
#
# Portas expostas:
#   Kafka broker (externo) : localhost:29092
#   Schema Registry        : localhost:8081
#   Control Center UI      : localhost:9021
#   Spark Master UI        : localhost:8080
#   Spark Master port      : localhost:7077
###############################################################################

networks:
  vpc_dm:
    external: true

volumes:
  kafka_data:
  spark_m_data:

services:

  # ---------------------------------------------------------------------------
  # Kafka — single-node KRaft (sem Zookeeper)
  # ---------------------------------------------------------------------------

  kafka-broker-1:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka-broker-1
    restart: on-failure
    ports:
      - "29092:29092"   # listener externo (acesso do host)
      - "9092:9092"     # listener interno (entre containers)
    environment:
      # KRaft: este nó age como broker e controller ao mesmo tempo
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qg"

      # Listeners:
      #   PLAINTEXT      → comunicação interna entre containers (porta 9092)
      #   CONTROLLER     → eleição KRaft (porta 9093, interno)
      #   PLAINTEXT_HOST → acesso do host (porta 29092)
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka-broker-1:9092,PLAINTEXT_HOST://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka-broker-1:9093"

      # Configurações gerais
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 8
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - vpc_dm

  schema-registry:
    image: confluentinc/cp-schema-registry:7.6.0
    container_name: schema-registry
    restart: on-failure
    depends_on:
      - kafka-broker-1
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: "kafka-broker-1:9092"
      SCHEMA_REGISTRY_LISTENERS: "http://0.0.0.0:8081"
    networks:
      - vpc_dm

  control-center:
    image: confluentinc/cp-enterprise-control-center:7.6.0
    container_name: control-center
    restart: on-failure
    depends_on:
      - kafka-broker-1
      - schema-registry
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: "kafka-broker-1:9092"
      CONTROL_CENTER_SCHEMA_REGISTRY_URL: "http://schema-registry:8081"
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      CONTROL_CENTER_INTERNAL_TOPICS_PARTITIONS: 1
      CONTROL_CENTER_MONITORING_INTERCEPTOR_TOPIC_PARTITIONS: 1
      CONFLUENT_METRICS_TOPIC_REPLICATION: 1
      PORT: 9021
    networks:
      - vpc_dm

  # ---------------------------------------------------------------------------
  # Apache Spark — master + 1 worker (apache/spark official)
  # ---------------------------------------------------------------------------

  spark-master:
    image: apache/spark:3.5.8-scala2.12-java17-python3-ubuntu
    container_name: spark-master
    restart: on-failure
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark cluster port
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - spark_m_data:/opt/spark/logs
    networks:
      - vpc_dm

  spark-worker-1:
    image: apache/spark:3.5.8-scala2.12-java17-python3-ubuntu
    container_name: spark-worker-1
    restart: on-failure
    depends_on:
      - spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 1G
      SPARK_WORKER_CORES: "1"
    networks:
      - vpc_dm
