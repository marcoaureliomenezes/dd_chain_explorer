name: Deploy Databricks (DABs)

on:
  workflow_dispatch:

env:
  DATABRICKS_CLI_VERSION: 0.218.0
  DABS_PATH: dabs

jobs:
  validate:
    name: Validate bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.DABS_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.218.0

      - name: Validate bundle
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_HML_TOKEN }}
        run: databricks bundle validate --target hml

  deploy-hml:
    name: Deploy to HML
    needs: validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.DABS_PATH }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.218.0

      - name: Deploy bundle to HML
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_HML_TOKEN }}
        run: |
          databricks bundle deploy --target hml \
            --var="kafka_bootstrap_servers=${{ secrets.MSK_BOOTSTRAP_SERVERS }}" \
            --var="dynamodb_table=${{ secrets.DYNAMODB_TABLE }}"

      - name: Verify deployment
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HML_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_HML_TOKEN }}
        run: |
          echo "=== DLT Pipelines ==="
          databricks pipelines list --output json | jq '.[] | .name'
          echo "=== Workflows ==="
          databricks jobs list --output json | jq '.jobs[] | .settings.name'
