resources:
  jobs:
    workflow_ddl_setup:
      name: "dm-ddl-setup"
      tasks:
        - task_key: setup_ddl
          spark_python_task:
            python_file: ../../src/batch/ddl/setup_ddl.py
            parameters:
              - "--catalog"
              - ${var.catalog}
              - "--lakehouse-s3-bucket"
              - ${var.ingestion_s3_bucket}
              - "--admin-group"
              - "admins"

      tags:
        layer: ddl
        project: dd-chain-explorer
