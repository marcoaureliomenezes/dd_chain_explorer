x-conf-dev-onchain-batch-txs: &conf_dev_onchain_batch_txs
  restart: "no"
  env_file:
    - ./conf/local.kafka.conf
  networks:
    - vpc_dm
  build: ../../../docker/onchain-batch-txs
  volumes:
    - ../../../docker/onchain-batch-txs/src:/app
    - ~/.aws:/root/.aws:ro

services:

  batch-job-kafka-create-topics:
    <<: *conf_dev_onchain_batch_txs
    container_name: batch-job-kafka-create-topics
    entrypoint: >-
      bash -c "cd /app/kafka_maintenance && python 0_create_topics.py conf/topics_dev.ini"


  # batch-job-kafka-delete-topics:
  #   <<: *conf_dev_onchain_batch_txs
  #   container_name: batch-job-kafka-delete-topics
  #   depends_on:
  #     batch-job-kafka-create-topics:
  #       condition: service_completed_successfully
  #   entrypoint: >-
  #     bash -c "cd /app/kafka_maintenance && python 1_delete_topics.py conf/topics_dev.ini --dry-run false"


  # Recria apenas o tópico de logs (mainnet.0.application.logs).
  # Usar após migrações que mudam o formato das mensagens de log (ex: nomes de API keys).
  # Deve ser seguido de reset_spark_checkpoint (make reset_spark_checkpoint).
  batch-job-recreate-logs-topic:
    <<: *conf_dev_onchain_batch_txs
    container_name: batch-job-recreate-logs-topic
    entrypoint: >-
      bash -c "cd /app/kafka_maintenance && python 2_recreate_logs_topic.py conf/topics_dev.ini"


  # Limpa todas as chaves nos databases Redis do semáforo (db=0) e contador (db=1).
  # Usar quando houver chaves em formato obsoleto que interferem na eleição de API keys.
  batch-job-flush-redis:
    image: redis:7-alpine
    restart: "no"
    networks:
      - vpc_dm
    entrypoint: >-
      sh -c "redis-cli -h redis -n 0 FLUSHDB && redis-cli -h redis -n 1 FLUSHDB"


  # batch-job-test-api-keys:
  #   <<: *conf_dev_onchain_batch_txs
  #   container_name: batch-job-test-api-keys
  #   entrypoint: "python -m chain_utilities.dm_test_api_keys"



networks:
  vpc_dm:
    external: true
