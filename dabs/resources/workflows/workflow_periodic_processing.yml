resources:
  jobs:
    workflow_periodic_processing:
      name: "dm-periodic-processing"
      # Schedule horário — substitui dag_hourly_2_contracts_transactions.py (Airflow)
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: "America/Sao_Paulo"
        pause_status: PAUSED  # Despausar após validação em PROD

      max_concurrent_runs: 1

      tasks:
        - task_key: get_popular_contracts
          notebook_task:
            notebook_path: ../../src/batch/periodic/1_get_popular_contracts.py
            source: WORKSPACE
            base_parameters:
              dynamodb_table: ${var.dynamodb_table}
              catalog: ${var.catalog}
        - task_key: ingest_contracts_txs
          depends_on:
            - task_key: get_popular_contracts
          notebook_task:
            notebook_path: ../../src/batch/periodic/2_ingest_contracts_txs.py
            source: WORKSPACE
            base_parameters:
              raw_s3_bucket: ${var.dev_ingestion_s3_bucket}
              catalog: ${var.catalog}
        - task_key: popular_contracts_scd2
          depends_on:
            - task_key: get_popular_contracts
          notebook_task:
            notebook_path: ../../src/batch/periodic/3_popular_contracts_scd2.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
        - task_key: export_gold_to_s3
          notebook_task:
            notebook_path: ../../src/batch/periodic/4_export_gold_to_s3.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              export_s3_path: "s3://${var.dev_ingestion_s3_bucket}/exports"
        - task_key: export_gold_tables
          notebook_task:
            notebook_path: ../../src/batch/periodic/5_export_gold_tables.py
            source: WORKSPACE
            base_parameters:
              catalog: ${var.catalog}
              export_s3_path: "s3://${var.dev_ingestion_s3_bucket}/exports"
      tags:
        layer: periodic
        project: dd-chain-explorer
