name: Auto Bump Version

on:
  pull_request:
    types: [closed]
    branches:
      - develop

permissions:
  contents: write

jobs:
  bump:
    name: Bump VERSION on merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type from PR title
        id: bump-type
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          echo "PR title: $TITLE"
          if echo "$TITLE" | grep -qi '\[major\]'; then
            echo "bump=major" >> $GITHUB_OUTPUT
          elif echo "$TITLE" | grep -qi '\[minor\]'; then
            echo "bump=minor" >> $GITHUB_OUTPUT
          else
            echo "bump=patch" >> $GITHUB_OUTPUT
          fi

      - name: Compute new version
        id: semver
        run: |
          CURRENT=$(cat VERSION | tr -d '[:space:]')
          BUMP="${{ steps.bump-type.outputs.bump }}"
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "current=$CURRENT"      >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Bumping $CURRENT â†’ $NEW_VERSION (${BUMP})"

      - name: Update VERSION file
        run: echo "${{ steps.semver.outputs.new_version }}" > VERSION

      - name: Update utils/pyproject.toml
        run: |
          NEW="${{ steps.semver.outputs.new_version }}"
          sed -i -E "s/^(version\s*=\s*[\"'])[^\"']+([\"'])/\1${NEW}\2/" utils/pyproject.toml
          echo "pyproject.toml version updated to $NEW"

      - name: Commit version bump
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION utils/pyproject.toml
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "ci: bump version ${{ steps.semver.outputs.current }} â†’ ${{ steps.semver.outputs.new_version }} [${{ steps.bump-type.outputs.bump }}]"
          git push origin develop
          echo "## Version Bumped" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Previous | \`${{ steps.semver.outputs.current }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| New      | \`${{ steps.semver.outputs.new_version }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Type     | \`${{ steps.bump-type.outputs.bump }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| PR       | #${{ github.event.pull_request.number }} â€” ${{ github.event.pull_request.title }} |" >> $GITHUB_STEP_SUMMARY
