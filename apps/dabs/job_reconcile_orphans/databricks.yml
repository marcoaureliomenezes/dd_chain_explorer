bundle:
  name: job-reconcile-orphans

include:
  - resources/workflows/workflow_reconcile_orphans.yml

variables:
  catalog:
    description: "Unity Catalog name"
    default: "dev"
  ingestion_s3_bucket:
    description: "S3 bucket for ingestion (Bronze tables)"
    default: "dm-chain-explorer-dev-ingestion"
  ethereum_rpc_url:
    description: "Ethereum JSON-RPC endpoint URL"
    default: ""
  max_blocks_per_run:
    description: "Max orphan blocks to reconcile per execution"
    default: "500"

targets:
  dev:
    presets:
      name_prefix: "[dev] "
    workspace:
      host: "https://dbc-409f1007-5779.cloud.databricks.com"
      root_path: "~/.bundle/${bundle.name}/dev"
    variables:
      catalog: "dev"
      ingestion_s3_bucket: "dm-chain-explorer-dev-ingestion"

  hml:
    presets:
      name_prefix: "[hml] "
    workspace:
      host: "https://dbc-409f1007-5779.cloud.databricks.com"
      root_path: "~/.bundle/${bundle.name}/hml"
    variables:
      catalog: "hml"
      ingestion_s3_bucket: "dm-chain-explorer-hml-lakehouse"

  prod:
    mode: production
    run_as:
      user_name: marcoaurelioreislima@gmail.com
    workspace:
      host: ""
      root_path: "/Workspace/.bundle/${bundle.name}/prod"
    variables:
      catalog: "prd"
      ingestion_s3_bucket: "dm-chain-explorer-lakehouse"
