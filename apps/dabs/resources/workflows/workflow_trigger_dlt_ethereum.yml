resources:
  jobs:
    dm-trigger-dlt-ethereum:
      name: "dm-trigger-dlt-ethereum"
      description: "CI trigger job — runs the dm-ethereum DLT pipeline once and waits for completion."
      max_concurrent_runs: 1
      tasks:
        - task_key: run_dlt_ethereum
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_ethereum.id}
            full_refresh: false
      tags:
        layer:   streaming
        project: dd-chain-explorer
        trigger: ci
